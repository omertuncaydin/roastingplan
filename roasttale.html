<style>
  :root{
    --bg:#0f0b08; --ink:#f3ede4; --muted:#a8998a; --line:#3a2f26;

  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent}
  html,body{margin:0;padding:0;background:var(--bg);height:100%}

    overflow-x:hidden; touch-action:manipulation; user-select:none; -webkit-user-select:none;
  }
  .hud{width:100%; max-width:520px; display:flex; align-items:center; gap:6px; padding:8px 10px 4px; flex-wrap:wrap}
  .hud .grow{flex:1}
  .chip{background:none; border:1px solid var(--line); color:var(--muted); padding:4px 9px; border-radius:999px; font-size:11px; cursor:pointer; font-weight:600}
  .chip.on{color:var(--gold); border-color:var(--accent)}
  .chip.pill{cursor:default}
  .chip.act{color:var(--accent); border-color:var(--accent)}
  .stage{position:relative; width:100%; max-width:520px; padding:0 8px}
  canvas#screen{
    display:block; width:100%; height:auto; aspect-ratio:4/3;
    image-rendering:pixelated; image-rendering:crisp-edges;
    background:#0f0b08; border:1px solid var(--line); border-radius:8px; touch-action:none;
  }
  .controls{width:100%; max-width:520px; display:flex; justify-content:space-between; align-items:center; padding:12px 14px 22px; gap:10px}
  .dpad{display:grid; grid-template-columns:repeat(3,46px); grid-template-rows:repeat(3,46px); gap:4px}
  .dpad button{background:var(--panel); border:1px solid var(--line); color:var(--ink); border-radius:9px; font-size:18px; cursor:pointer}
  .dpad .empty{background:none; border:none}
  .dpad button:active{background:var(--accent); color:#1a1410}
  .abwrap{display:flex; gap:14px; align-items:center}
  .abtn{width:60px; height:60px; border-radius:50%; border:2px solid var(--line); background:var(--panel); color:var(--ink); font-size:20px; font-weight:800; cursor:pointer}
  .abtn.a{border-color:var(--accent); color:var(--gold)}
  .abtn:active{background:var(--accent); color:#1a1410}
  .overlay{position:fixed; inset:0; background:rgba(10,8,6,.9); display:flex; align-items:flex-start; justify-content:center; padding:18px; z-index:40; overflow:auto}
  .card{max-width:460px; width:100%; background:var(--panel); border:2px solid var(--accent); border-radius:14px; padding:18px 16px; margin:auto 0}
  .card h2{font-size:18px; margin:0 0 4px; text-align:center; letter-spacing:.06em}
  .card .sub{font-size:12px; color:var(--muted); text-align:center; margin:0 0 12px}
  .card .en{color:var(--muted); font-size:.86em}
  .rankList{list-style:none; margin:8px 0; padding:0}
  .rankRow{display:flex; gap:10px; align-items:center; padding:8px 10px; border:1px solid var(--line); border-radius:9px; margin-bottom:6px; background:var(--bg)}
  .rankRow.g1{border-color:var(--gold)} .rankRow.g2{border-color:#c9c4bb} .rankRow.g3{border-color:#b07a43}
  .rankRow .pos{width:26px; text-align:center; font-weight:800; color:var(--muted); font-variant-numeric:tabular-nums}
  .rankRow.g1 .pos{color:var(--gold)}
  .rankRow .who{flex:1; min-width:0; font-size:14px}
  .rankRow .who .co{display:block; font-size:11px; color:var(--muted)}
  .rankRow .sc{font-weight:800; color:var(--gold); font-variant-numeric:tabular-nums}
  .resline{display:flex; justify-content:space-around; text-align:center; gap:8px; margin:10px 0}
  .sw{width:56px; height:56px; border-radius:50%; border:2px solid var(--line); margin:0 auto 6px}
  .resnum{font-size:22px; font-weight:800}
  .reslab{font-size:11px; color:var(--muted); text-transform:uppercase; letter-spacing:.08em}
  .frame{font-size:13px; text-align:center; color:var(--gold); font-weight:600; margin:8px 0; line-height:1.5}
  .frame .en{display:block; color:var(--muted); font-weight:500; margin-top:2px}
  .btn{display:block; width:100%; padding:13px; font-size:15px; font-weight:800; background:var(--accent); color:#1a1410; border:none; border-radius:10px; cursor:pointer; margin-top:8px}
  .btn.ghost{background:transparent; border:1px solid var(--line); color:var(--ink)}
  .btn .en{color:rgba(26,20,16,.7); font-size:.8em; font-weight:600}
  .btn.ghost .en{color:var(--muted)}
  .postForm input[type=text]{width:100%; padding:11px; margin:6px 0; background:var(--bg); border:1px solid var(--line); border-radius:9px; color:var(--ink); font-size:14px}
  .consent{display:flex; gap:8px; align-items:flex-start; font-size:12px; color:var(--muted); margin:8px 0; line-height:1.4}
  .consent input{margin-top:2px}
  .links{display:flex; gap:8px; margin-top:12px}
  .links a{flex:1; text-align:center; text-decoration:none; padding:11px 8px; border:1px solid var(--line); border-radius:9px; color:var(--ink); font-size:12px; font-weight:600}
  .links a .en{display:block; font-size:10px; color:var(--muted); font-weight:500; margin-top:2px}
  .honest{font-size:11px; color:var(--muted); line-height:1.55; margin-top:14px; border-top:1px solid var(--line); padding-top:10px}
  .honest b{color:var(--accent)}
  .toast{position:fixed; left:50%; bottom:24px; transform:translateX(-50%); background:var(--panel); border:1px solid var(--accent); color:var(--ink); padding:10px 15px; border-radius:9px; font-size:13px; z-index:60; max-width:90%; text-align:center}
  .hidden{display:none !important}
  .credits{width:100%; max-width:520px; text-align:center; font-size:11px; color:var(--muted); padding:2px 10px 16px}
  @media (min-width:560px){ .controls{opacity:.85} }
</style>

    var x0=a[i][0], y0=a[i][1], x1=a[i+1][0], y1=a[i+1][1];
    if(cum <= x1){ return clamp(y0 + (y1-y0)*(cum-x0)/(x1-x0), 60, 118); }
  }
  var n=a.length, px0=a[n-2][0], py0=a[n-2][1], px1=a[n-1][0], py1=a[n-1][1];
  var slope=(py1-py0)/(px1-px0);
  return clamp(py1 + slope*(cum-px1), 60, 118);
}
function agtronForSample(s, cum){
  if(s.anchors) return agtronFromAnchors(s.anchors, cum);
  var frac = s.totalGain>0 ? (cum/s.totalGain) : 0;
  return clamp(115 + (s.terminalAg - 115)*frac, 60, 118);
}
function cumGainForSample(s, nowT){
  var c=0, C=s.cracks;
  for(var i=0;i<C.length;i++){ if(C[i][0] <= nowT + 1e-9) c += C[i][1]; else break; }
  return c;
}
function agtronColor(ag){
  var t = clamp((ag-60)/(118-60), 0, 1);
  return 'rgb('+Math.round(46+t*162)+','+Math.round(28+t*118)+','+Math.round(16+t*74)+')';
}

/* ---------- AUDIO (WebAudio chiptune loop + SFX) ---------- */
var AC = null, master = null, musicTimer = null, musicStep = 0;
function ensureAudio(){
  if(AC) return AC;
  try{
    var Ctx = window.AudioContext || window.webkitAudioContext;
    AC = new Ctx();
    master = AC.createGain(); master.gain.value = game.muted ? 0 : 0.5;
    master.connect(AC.destination);
  }catch(e){ AC = null; }
  return AC;
}
function beep(freq, dur, type, vol){
  var ac = ensureAudio(); if(!ac || !master) return;
  try{
    if(ac.state==='suspended' && ac.resume) ac.resume();
    var o = ac.createOscillator(), g = ac.createGain();
    o.type = type || 'square'; o.frequency.value = freq;
    var t0 = ac.currentTime;
    g.gain.setValueAtTime(0.0001, t0);
    g.gain.exponentialRampToValueAtTime(vol||0.12, t0+0.008);
    g.gain.exponentialRampToValueAtTime(0.0001, t0+(dur||0.09));
    o.connect(g); g.connect(master); o.start(t0); o.stop(t0+(dur||0.09)+0.02);
  }catch(e){}
}
function sfx(kind){
  if(kind==='text') beep(660, 0.02, 'square', 0.05);
  else if(kind==='move') beep(440, 0.04, 'square', 0.07);
  else if(kind==='select') beep(880, 0.08, 'square', 0.10);
  else if(kind==='cancel') beep(220, 0.08, 'square', 0.08);
  else if(kind==='pop') beep(520+Math.random()*400, 0.05, 'square', 0.10);
  else if(kind==='hurt') beep(150, 0.16, 'square', 0.14);
  else if(kind==='good') { beep(523,0.09,'triangle',0.12); setTimeout(function(){beep(784,0.12,'triangle',0.12);},110); }
}
/* gentle 8-bar loop, A-minor pentatonic feel */
var MEL = [440,0,523,0, 587,0,523,0, 494,0,440,0, 392,0,440,0,
          523,0,587,0, 659,0,587,0, 523,0,494,0, 440,0,0,0];
var BASS = [110,0,0,0, 87.31,0,0,0, 130.81,0,0,0, 98,0,0,0,
            110,0,0,0, 130.81,0,0,0, 146.83,0,0,0, 110,0,0,0];
function startMusic(){
  var ac = ensureAudio(); if(!ac) return;
  if(musicTimer) return;
  musicStep = 0;
  var stepMs = 190; // ~ gentle 90-ish feel
  musicTimer = setInterval(function(){
    if(!master) return;
    var m = MEL[musicStep % MEL.length], b = BASS[musicStep % BASS.length];
    if(m) beep(m, 0.17, 'square', 0.045);
    if(b) beep(b, 0.34, 'triangle', 0.05);
    musicStep++;
  }, stepMs);
}

  game.muted = mute;

if(ctx && 'imageSmoothingEnabled' in ctx) ctx.imageSmoothingEnabled = false;

function px(x,y,w,h,c){ if(!ctx) return; ctx.fillStyle=c; ctx.fillRect(x|0,y|0,w|0,h|0); }
function fnt(size,bold){ if(ctx) ctx.font = (bold?'bold ':'') + (size||8) + "px 'Courier New', monospace"; }
function txt(str,x,y,c,size,align,bold){
  if(!ctx) return;
  fnt(size,bold); ctx.fillStyle=c||'#f3ede4'; ctx.textAlign=align||'left'; ctx.textBaseline='top';
  ctx.fillText(str, x|0, y|0);
}
function measure(str){
  if(ctx && ctx.measureText){ var m = ctx.measureText(str); if(m && typeof m.width==='number') return m.width; }
  return str.length * 5.4;
}
function wrap(str, maxW){
  var words = String(str).split(' '), rows=[], line='';
  for(var i=0;i<words.length;i++){
    var test = line ? line+' '+words[i] : words[i];
    if(measure(test) > maxW && line){ rows.push(line); line = words[i]; }
    else line = test;
  }
  if(line) rows.push(line);
  return rows;
}

function drawGainEnvelope(pairs, x, y, w, h, color){
  if(!ctx) return 0;
  if(!pairs || !pairs.length) return 0;
  var t0=pairs[0][0], t1=pairs[pairs.length-1][0], span=Math.max(0.001, t1-t0);
  var nb=Math.max(1, Math.min(48, Math.round(w/4)));
  var bins=new Array(nb); for(var i=0;i<nb;i++) bins[i]=0;
  var maxB=1;
  for(var k=0;k<pairs.length;k++){
    var bi2=Math.min(nb-1, Math.floor((pairs[k][0]-t0)/span*(nb-1)));
    bins[bi2]+=pairs[k][1];
  }
  for(var m=0;m<nb;m++){ if(bins[m]>maxB) maxB=bins[m]; }
  var bw2=w/nb, drawn=0;
  for(var n=0;n<nb;n++){
    var hh=(bins[n]/maxB)*h;
    px(x + n*bw2, y+h-hh, Math.max(1,bw2-1), hh, color); drawn++;
  }
  return drawn;
}

/* -- ear-training drills on the real session slice --
   SAMPLER hosts the count drill at his bench; the GREEN BEANS host the
   fast/slow group game near YEŞİL. Both feed the shared 50-point drill cap. -- */
function drillSlice(){
  var span = 8 + Math.random()*2;              // 8-10 s slice of the real session
  var maxStart = Math.max(0, DUEL.lastT - span);
  var start = Math.random()*maxStart;
  var times=[], pairs=[];
  for(var i=0;i<DUEL.cracks.length;i++){
    var t=DUEL.cracks[i][0];
    if(t>=start && t<start+span){ times.push(t); pairs.push(DUEL.cracks[i]); }
  }
  return { start:start, span:span, times:times, pairs:pairs };
}
function playDrillSlice(sl, speed){
  speed = speed || 3;
  if(typeof setTimeout!=='function') return;
  for(var i=0;i<sl.times.length;i++){
    (function(t){ setTimeout(function(){ sfx('pop'); }, Math.max(0,(t-sl.start)/speed*1000)); })(sl.times[i]);
  }
}
/* SAMPLER's bench: count drill only ("Kaç çıtırtı?"). */
function startCountDrill(){
  game.mode='listen';
  var sl = drillSlice(), tries=0;
  while(sl.times.length < 3 && tries<8){ sl=drillSlice(); tries++; }
  playDrillSlice(sl);
  var count = sl.times.length;
  var choices = [count, Math.max(0,count-2), count+3];
  for(var s=choices.length-1;s>0;s--){ var rr=Math.floor(Math.random()*(s+1)); var tmp=choices[s]; choices[s]=choices[rr]; choices[rr]=tmp; }
  var correctIdx = choices.indexOf(count);
  game.listen = { kind:'drill', qType:'count', host:'sampler', optCount:3, prompt:'q_count',
    opts:[String(choices[0]),String(choices[1]),String(choices[2])], idx:0, correctIdx:correctIdx, slice:sl };
}
/* GREEN BEANS' group game near YEŞİL: fast/slow drill ("Hızlı mı yavaş mı?"). */
function startSpeedDrill(){
  game.mode='listen';
  var s1=drillSlice(), s2=drillSlice(), guard=0;
  while(guard<8 && (s1.times.length/s1.span) === (s2.times.length/s2.span)){ s2=drillSlice(); guard++; }
  playDrillSlice(s1); playDrillSlice(s2, 3);
  var d1=s1.times.length/s1.span, d2=s2.times.length/s2.span;
  var faster = d1 > d2;
  game.listen = { kind:'drill', qType:'speed', host:'green', optCount:2, prompt:'q_speed',
    opts:['opt_fast','opt_slow'], idx:0, correctIdx: faster?0:1, slice:s1, slice2:s2 };
}
/* backward-compatible alias for the old single entry point */
function startDrill(){ startCountDrill(); }
function answerListen(idx){
  var L=game.listen; if(!L) return false;
  if(typeof idx!=='number') idx=L.idx;
  var correct = (idx===L.correctIdx);
  if(correct){
    sfx('good');
    if(L.kind==='plaque'){
      if(!game.flags.plaqueAward){ game.flags.plaqueAward=true; addKulak(10); }
      game.flags.plaque=true;
      game.mode='room';
      startDialog(['p_calibrated'], null, ['plaque']);
    } else {
      drillReward();
      game.drillsCorrect = (game.drillsCorrect||0) + 1;
      game.mode='room';
      if(L.host==='sampler') startDialog(['drill_good','sampler_coach'], null, ['sampler','sampler']);
      else startDialog(['drill_good','gb_good'], null, ['greenbeans','greenbeans']);
    }
  } else {
    sfx('cancel');
    if(L.kind==='plaque'){ playPlaquePops(L.deeperFirst); startDialog(['p_retry'], null, ['plaque']); }
    else { startDialog(['drill_retry'], null, [L.host==='sampler' ? 'sampler' : 'greenbeans']); }
  }
  return correct;
}

/* ---------- OVERWORLD MOVEMENT ---------- */
function roomBounds(){ return { x0:22, y0:44, x1:W-22, y1:H-22 }; }
function solidsForRoom(){
  var list = roomInteractables(), solids=[];
  for(var i=0;i<list.length;i++){ if(list[i].solid) solids.push(list[i]); }
  return solids;
}
function moveOverworld(dt){
  if(game.dialog.active) return;
  var b = roomBounds(), sp = 78 * dt/1000, nx=game.px, ny=game.py;
  if(input.left){ nx -= sp; game.facing='left'; }
  if(input.right){ nx += sp; game.facing='right'; }
  if(input.up){ ny -= sp; game.facing='up'; }
  if(input.down){ ny += sp; game.facing='down'; }
  nx = clamp(nx, b.x0, b.x1); ny = clamp(ny, b.y0, b.y1);
  // solid collision (bounding circle)
  var solids = solidsForRoom();
  for(var i=0;i<solids.length;i++){
    var s=solids[i];
    if(Math.hypot(s.x-nx, s.y-ny) < 20){
      // block: keep old axis that reduces overlap
      if(Math.hypot(s.x-nx, s.y-game.py) >= 20) ny = game.py;
      else if(Math.hypot(s.x-game.px, s.y-ny) >= 20) nx = game.px;
      else { nx = game.px; ny = game.py; }
    }
  }
  game.px = nx; game.py = ny;
}

function startEncounter(){

    soul:{x:160,y:95}, projs:[], waveT:0, spawnT:0, invuln:0, waves:0,
    survived:[], slice:null, schedule:[], spawnIdx:0, waveSpeed:6
  };
  startDialog(['t_intro1','t_intro2'], function(){ game.enc.sub='menu'; }, ['tambur','tambur']);
}
var ENC_ACTS = ['a_listen','a_look','a_bag','a_hug'];
function encSelect(idx, opts){
  var e = game.enc; if(!e) return;
  opts = opts || {};
  if(idx===0){ // DİNLE
    e.listen++;
    if(e.listen>=2){ encResolveCalm(); return; }
    startDialog(['t_listen1'], function(){ opts.skipDodge ? backToMenu() : startWave(); }, ['narr']);
  } else {
    var key = idx===1 ? 'act_look' : (idx===2 ? 'act_bag' : 'act_hug');
    var spk = idx===3 ? 'narr' : (idx===1 ? 'narr' : 'player');
    startDialog([key], function(){ opts.skipDodge ? backToMenu() : startWave(); }, ['narr']);
  }
}
function backToMenu(){ if(game.enc){ game.enc.sub='menu'; } }
function tamburSlice(waveIx){
  var starts=[46, 96, 32], span=12;
  var start=starts[((waveIx||1)-1) % starts.length];
  var times=[], pairs=[];
  for(var i=0;i<DUEL.cracks.length;i++){
    var t=DUEL.cracks[i][0];
    if(t>=start && t<start+span){ times.push(t); pairs.push(DUEL.cracks[i]); }
  }
  return { start:start, span:span, times:times, pairs:pairs };
}
function spawnTamburProj(e){
  var b=e.box;
  var fromLeft = (e.spawnIdx % 2 === 0);
  var sx = fromLeft ? b.x-6 : b.x+b.w+6;
  var sy = b.y + b.h - 6 - (e.spawnIdx % 3)*4;
  var vx = (fromLeft?1:-1) * (b.w/1.6) / 2.4;
  var vy = -(b.h) / 1.2;
  e.projs.push({ x:sx, y:sy, vx:vx, vy:vy, r:4, rot:0 });
}
function startWave(){
  var e = game.enc; if(!e) return;
  e.sub='dodge'; e.waveT=0; e.spawnT=0; e.projs=[]; e.waves++;
  e.soul.x = e.box.x + e.box.w/2; e.soul.y = e.box.y + e.box.h/2;
  e.slice = tamburSlice(e.waves);
  e.schedule = e.slice.times.slice();
  e.spawnIdx = 0; e.waveSpeed = 6;
}
function encHit(force){
  var e = game.enc; if(!e || e.sub!=='dodge') return;
  if(!force && e.invuln>0) return;
  e.hp -= 1; e.invuln = 900; sfx('hurt');
  if(e.hp <= 1){ e.hp = 1; encResolveAshamed(); }
}
function encResolveCalm(){
  var e = game.enc; e.sub='resolve';
  startDialog(['t_resolve'], function(){ finishEncounter('calm'); }, ['tambur']);
}
function encResolveAshamed(){
  var e = game.enc; e.sub='resolve'; e.projs=[];
  startDialog(['t_ashamed'], function(){ finishEncounter('ashamed'); }, ['narr']);
}
function finishEncounter(reason){
  game.flags.tamburDone = true;
  if(!game.flags.tamburKulak){ game.flags.tamburKulak = true; addKulak(10); }
  if(game.enc) game.enc.sub = 'bell';
  startDialog(['t_bell'], function(){
    startDialog(['prob_taunt','prob_drag'], function(){ startDuel(); }, ['prob','prob']);
  }, ['tambur']);
}
function updateEncounter(dt){
  var e = game.enc; if(!e) return;
  if(e.invuln>0) e.invuln -= dt;
  if(e.sub!=='dodge') return;
  e.waveT += dt;
  // soul movement
  var b=e.box, sp=90*dt/1000;
  if(input.left) e.soul.x -= sp; if(input.right) e.soul.x += sp;
  if(input.up) e.soul.y -= sp; if(input.down) e.soul.y += sp;
  e.soul.x = clamp(e.soul.x, b.x+4, b.x+b.w-4); e.soul.y = clamp(e.soul.y, b.y+4, b.y+b.h-4);
  // projectiles spawn ON THE REAL CRACK TIMESTAMPS of the slice (the wave is the sound made visible)
  var sessT = e.slice ? (e.slice.start + (e.waveT/1000)*e.waveSpeed) : 0;
  while(e.slice && e.spawnIdx < e.schedule.length && e.schedule[e.spawnIdx] <= sessT){
    if(e.projs.length < 6) spawnTamburProj(e);   // fairness: cap simultaneous projectiles
    e.survived.push(e.slice.pairs[e.spawnIdx]);  // record exactly what was thrown
    e.spawnIdx++;
    sfx('pop');
  }
  // update projectiles (parabolic arc)
  var grav = (e.box.h) / 0.9;
  for(var i=e.projs.length-1;i>=0;i--){
    var p=e.projs[i];
    p.vy += grav * dt/1000;
    p.x += p.vx * dt/1000; p.y += p.vy * dt/1000; p.rot += dt/120;
    if(Math.hypot(p.x-e.soul.x, p.y-e.soul.y) < 7){ encHit(false); }
    if(p.x < b.x-16 || p.x > b.x+b.w+16 || p.y > b.y+b.h+20){ e.projs.splice(i,1); }
  }
  // end of wave: schedule spent and the box is clear (or a hard safety cap)
  if((e.spawnIdx >= e.schedule.length && e.projs.length===0) || e.waveT > 15000){ e.projs=[]; e.sub='menu'; }
}

/* ---------- DUEL (Prob / Agtron Challenge round) ---------- */
function startDuel(){
  game.mode='duel';
  game.duel = { sub:'target', realT:0, crackIdx:0, dropped:false, result:null, speed:4 };
  startDialog(['prob_mock','prob_target'], function(){ game.duel.sub='play'; game.duel.realT=0; game.duel.crackIdx=0; }, ['prob','prob']);
}
function duelDrop(atReal){
  var d = game.duel; if(!d || d.sub!=='play' || d.dropped) return;
  d.dropped = true; d.sub='reveal';
  var real = (typeof atReal==='number') ? atReal : d.realT;
  if(real > DUEL.lastT) real = DUEL.lastT;
  var cum = cumGainForSample(DUEL, real);
  var playerAg = agtronForSample(DUEL, cum);
  var target = 88;
  var playerDelta = Math.abs(playerAg - target);
  game.flags.duelDone = true;
  if(game.bestDuelDelta==null || playerDelta < game.bestDuelDelta) game.bestDuelDelta = playerDelta;
  // Prob boasts a scripted result that is WORSE by 6 to 9 (his fiction).
  var worseBy = 6 + Math.floor(Math.random()*4); // 6..9
  var probDelta = playerDelta + worseBy;
  // Prob reads the drum lighter than the bean: target + probDelta, clamped.
  var probAg = clamp(target + probDelta, 60, 118);
  probDelta = Math.abs(probAg - target);
  d.result = {
    real:real, playerAg:playerAg, playerDelta:playerDelta,
    probAg:probAg, probDelta:probDelta, target:target, worseBy:worseBy
  };
  sfx('good');
  startDialog(['prob_boast','prob_frame','you_closer'], function(){ showEndCard(); }, ['prob','narr','narr']);
}
function updateDuel(dt){
  var d = game.duel; if(!d || d.sub!=='play') return;
  d.realT += (dt/1000) * d.speed;
  // play pops at the real timestamps (fast-forward clock)
  while(d.crackIdx < DUEL.cracks.length && DUEL.cracks[d.crackIdx][0] <= d.realT){
    sfx('pop'); d.crackIdx++;
  }
  if(d.realT >= DUEL.lastT){ duelDrop(DUEL.lastT); }
}
function drawDuel(){
  px(0,0,W,H,'#0f0b08');
  drawProb(150,16);
  txt(T('n_prob'), 172, 20, '#c9ccd2', 9, 'left', true);
  txt(T('lab_target')+': 88', 12, 20, '#e6c14b', 10, 'left', true);
  var d = game.duel; if(!d) return;
  // KULAK changes what the ear can PERCEIVE, never the score.
  var kk = game.kulak||0;
  var fine = kk>=30, showTicks = kk>=60, bright = kk>=80;
  var bx=20, by=92, bw=280, bh=100;
  px(bx-2,by-2,bw+4,bh+4,'#3a2f26'); px(bx,by,bw,bh,'#160f0a');
  var binW = fine?1:2, nb=Math.ceil((DUEL.lastT+0.001)/binW);
  var bins=new Array(nb); for(var i=0;i<nb;i++) bins[i]=0;
  var maxBin=1, maxIdx=0;
  for(var k=0;k<DUEL.cracks.length;k++){ var b2=Math.min(nb-1,Math.floor(DUEL.cracks[k][0]/binW)); bins[b2]+=DUEL.cracks[k][1]; }
  for(var m=0;m<nb;m++){ if(bins[m]>maxBin){ maxBin=bins[m]; maxIdx=m; } }
  var bw2=(bw)/nb, upto = d.sub==='play' ? d.realT : (d.result?d.result.real:DUEL.lastT);
  for(var n=0;n<nb;n++){
    var filled = (n*binW) <= upto;
    var hh = (bins[n]/maxBin)*(bh-6);
    var col = filled ? '#c98a3c' : '#2a221b';
    if(bright && filled && Math.abs(n-maxIdx) <= 1) col = '#e6c14b'; // subtle brightness near the peak
    px(bx + n*bw2, by+bh-hh, Math.max(1,bw2-1), hh, col);
  }
  var ticks = 0;
  if(showTicks){
    // faint, REAL stage marks computed from the crack pattern: first crack and the peak
    var mk = [DUEL.cracks[0][0], maxIdx*binW];
    for(var q=0;q<mk.length;q++){
      if(mk[q] > upto) continue;
      var tickX = bx + (mk[q]/DUEL.lastT)*bw;
      px(tickX|0, by, 1, bh, '#6b4a2a');
      ticks++;
    }
  }
  d.bellInfo = { bars:nb, fine:fine, ticks:ticks, showTicks:showTicks, bright:bright };
  if(d.sub==='play'){
    var dl = T('duel_drop');
    px(110,200,100,28,'#d9663f'); txt(dl, 160-measure(dl)/2, 208, '#fff', 12, 'left', true);
    txt(T('duel_hint'), 20, 200, '#a8998a', 8, 'left');
  }
}

  var steps = [ !!game.flags.yesil, !!game.flags.plaque, (game.drillsCorrect||0)>0,
                !!game.flags.tamburDone, !!game.flags.duelDone ];
  var done=0; for(var i=0;i<steps.length;i++){ if(steps[i]) done++; }
  return Math.round(done/steps.length*100);
}
function statRow(labelKey, valTr, valEn){
  return '<div class="frame" style="margin:4px 0">'+T(labelKey)+': '+valTr+
         '<span class="en">'+S[labelKey].en+': '+valEn+'</span></div>';
}
function showStatsPanel(){
  var card = document.getElementById('statsCard'); if(!card) return;
  var kulak = (game.kulak||0);
  var drills = (game.drillsCorrect||0);
  var tamburTr = game.flags.tamburDone ? S.stat_yes.tr : S.stat_no.tr;
  var tamburEn = game.flags.tamburDone ? S.stat_yes.en : S.stat_no.en;
  var duelVal = (game.bestDuelDelta==null) ? '-' : String(Math.round(game.bestDuelDelta*10)/10);
  var prog = chapterProgress()+'%';
  card.innerHTML =
    '<h2>'+T('stats_title')+'</h2>'+
    '<div class="sub">'+S.n_table.tr+' · '+S.n_table.en+'</div>'+
    statRow('stat_kulak', kulak+'/100', kulak+'/100')+
    statRow('stat_drills', String(drills), String(drills))+
    statRow('stat_tambur', tamburTr, tamburEn)+
    statRow('stat_duel', duelVal, duelVal)+
    statRow('stat_progress', prog, prog)+
    '<button class="btn" id="btnStatsSave">'+S.stats_save.tr+' <span class="en">· '+S.stats_save.en+'</span></button>';
  document.getElementById('statsOverlay').classList.remove('hidden');
  var sb = document.getElementById('btnStatsSave');
  if(sb) sb.addEventListener('click', function(){
    document.getElementById('statsOverlay').classList.add('hidden');
    doSave();
    startDialog(['save_line'], function(){ toast(T('t_saved')); }, ['table']);
  });
}

/* ---------- TITLE + LADDER ---------- */
var starBeans = [];
(function(){ for(var i=0;i<26;i++){ starBeans.push({ x:Math.random()*W, y:Math.random()*H, s:0.2+Math.random()*0.7 }); } })();
function titleMenuItems(){
  var items = [{key:'m_start', act:'start'}];
  if(game.saveExists) items.push({key:'m_continue', act:'continue'});
  items.push({key:'m_ladder', act:'ladder'});
  return items;
}
function drawTitle(dt){
  px(0,0,W,H,'#0f0b08');
  for(var i=0;i<starBeans.length;i++){
    var b=starBeans[i]; b.y += b.s*dt/40; if(b.y>H){ b.y=0; b.x=Math.random()*W; }
    px(b.x, b.y, 2, 3, i%3===0?'#3c6e2a':'#4a6e2a');
    px(b.x, b.y, 1, 1, '#6fae4f');
  }
  txt('RoastTale', W/2, 44, '#e6c14b', 22, 'center', true);
  txt('R O A S T T A L E', W/2, 70, '#c98a3c', 8, 'center');
  txt(T('title_sub'), W/2, 84, '#a8998a', 9, 'center');
  var items = titleMenuItems();
  var y0=126;
  for(var m=0;m<items.length;m++){
    var sel = (m===game.menuIdx);
    var label = T(items[m].key);
    if(sel){ txt('▶', W/2 - measure(label)/2 - 14, y0+m*22, '#e6c14b', 11, 'left', true); }
    txt(label, W/2, y0+m*22, sel?'#f3ede4':'#a8998a', 12, 'center', sel);
  }
  txt('a CoffeeNutz game · with love to Undertale', W/2, 212, '#7a6f63', 7, 'center');
  txt(VERSION, W/2, 224, '#7a6f63', 7, 'center');
}
function titleConfirm(){
  var items = titleMenuItems(), it = items[game.menuIdx];
  if(!it) return;
  sfx('select');
  if(it.act==='start'){ newGame(); }
  else if(it.act==='continue'){ continueGame(); }
  else if(it.act==='ladder'){ openLadder(); }
}
function newGame(){
  startMusic();
  game.kulak=0; game.kulakDrill=0; game.drillsCorrect=0; game.bestDuelDelta=null;
  game.flags={ yesil:false, sampler:false, greenbeans:false, plaque:false, plaqueAward:false, saved:false, tamburDone:false, tamburKulak:false, duelDone:false };
  game.mode='intro';
  startDialog(['intro1','intro2','intro3','intro4','intro5'], function(){ enterGreenRoom(true); }, ['narr','narr','narr','narr','narr']);
}
function continueGame(){
  var d = loadSave(); if(!d){ newGame(); return; }
  startMusic();
  game.flags = Object.assign({ yesil:false, sampler:false, greenbeans:false, plaque:false, plaqueAward:false, saved:false, tamburDone:false, tamburKulak:false, duelDone:false }, d.flags||{});
  game.room = d.room; game.px = d.px; game.py = d.py;
  game.kulak = d.kulak||0; game.kulakDrill = d.kulakDrill||0;
  game.drillsCorrect = d.drillsCorrect||0;
  game.bestDuelDelta = (d.bestDuelDelta==null ? null : d.bestDuelDelta);
  updateKulakHud();
  game.mode = 'room';
}
function enterGreenRoom(fresh){
  game.mode='room'; game.room='green';
  if(fresh){ game.px=160; game.py=196; game.facing='up'; }
}
function enterDrumHall(){
  game.mode='room'; game.room='drum'; game.px=160; game.py=200; game.facing='up';
  sfx('select');
}
function openLadder(){
  var ov=document.getElementById('ladderOverlay'), list=document.getElementById('ladderList');
  document.getElementById('ladderTitle').textContent = T('ladder_title');
  document.getElementById('ladderSub').textContent = T('ladder_sub');
  document.getElementById('ladderBack').firstChild.textContent = T('ladder_back')+' ';
  list.innerHTML = '<li class="rankRow"><span class="who">...</span></li>';
  ov.classList.remove('hidden');
  fetchLadderTop5().then(function(rows){
    list.innerHTML='';
    if(!rows || !rows.length){ list.innerHTML = '<li class="rankRow"><span class="who">'+T('ladder_empty')+'</span></li>'; return; }
    for(var i=0;i<rows.length;i++){
      var r=rows[i], li=document.createElement('li');
      li.className='rankRow'+(i===0?' g1':(i===1?' g2':(i===2?' g3':'')));
      var co = r.company ? '<span class="co">'+esc(r.company)+'</span>' : '';
      var sc = Number(r.score);
      li.innerHTML = '<span class="pos">'+(i+1)+'.</span><span class="who">'+esc(r.name||'')+co+'</span><span class="sc">'+(isFinite(sc)?sc.toFixed(1):'--')+'</span>';
      list.appendChild(li);
    }
  }).catch(function(){ list.innerHTML = '<li class="rankRow"><span class="who">'+T('t_ladder_fail')+'</span></li>'; });
}
function esc(s){ return String(s).replace(/[&<>"]/g, function(c){ return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]; }); }

/* ---------- INPUT ---------- */
var input = { up:false, down:false, left:false, right:false };
function onConfirm(){
  if(game.mode==='title'){ titleConfirm(); return; }
  if(game.dialog.active){ if(!game.dialog.done) sfx('text'); else sfx('select'); advanceDialog(); return; }
  if(game.mode==='room'){
    var it = nearestInteractable();
    if(it){ sfx('select'); it.action(); }
    return;
  }
  if(game.mode==='listen'){
    var L=game.listen;
    if(L){ sfx('select'); answerListen(L.idx); }
    return;
  }
  if(game.mode==='encounter'){
    var e=game.enc;
    if(e && e.sub==='menu'){ sfx('select'); encSelect(e.menuIdx, {}); }
    return;
  }
  if(game.mode==='duel'){
    var d=game.duel;
    if(d && d.sub==='play'){ duelDrop(); }
    return;
  }
}
function onCancel(){
  if(game.dialog.active){ advanceDialog(); return; }
  sfx('cancel');
}
function onDir(dir, pressed){
  input[dir] = pressed;
  if(!pressed) return;
  // menu navigation
  if(game.mode==='title' && !game.dialog.active){
    var n = titleMenuItems().length;
    if(dir==='up'){ game.menuIdx=(game.menuIdx-1+n)%n; sfx('move'); }
    if(dir==='down'){ game.menuIdx=(game.menuIdx+1)%n; sfx('move'); }
  } else if(game.mode==='listen' && game.listen && !game.dialog.active){
    var L=game.listen;
    if(dir==='left'){ L.idx=(L.idx-1+L.optCount)%L.optCount; sfx('move'); }
    if(dir==='right'){ L.idx=(L.idx+1)%L.optCount; sfx('move'); }
  } else if(game.mode==='encounter' && game.enc && game.enc.sub==='menu'){
    var e=game.enc;
    if(dir==='left'||dir==='up') { e.menuIdx=(e.menuIdx+3)%4; sfx('move'); }
    if(dir==='right'||dir==='down') { e.menuIdx=(e.menuIdx+1)%4; sfx('move'); }
  }
}
var KEYMAP = { ArrowUp:'up', ArrowDown:'down', ArrowLeft:'left', ArrowRight:'right',
  w:'up', s:'down', a:'left', d:'right', W:'up', S:'down', A:'left', D:'right' };
document.addEventListener('keydown', function(ev){
  ensureAudio(); if(AC && AC.state==='suspended' && AC.resume) AC.resume();
  var k=ev.key;
  if(KEYMAP[k]){ ev.preventDefault(); onDir(KEYMAP[k], true); return; }
  if(k==='z'||k==='Z'||k==='Enter'||k===' '){ ev.preventDefault(); onConfirm(); return; }
  if(k==='x'||k==='X'||k==='Escape'){ ev.preventDefault(); onCancel(); return; }
});
document.addEventListener('keyup', function(ev){ var k=ev.key; if(KEYMAP[k]){ onDir(KEYMAP[k], false); } });

/* ---------- TOAST ---------- */
var toastEl=null, toastTimer=null;
function toast(msg){
  if(typeof document==='undefined') return;
  if(!toastEl){ toastEl=document.createElement('div'); toastEl.className='toast'; }
  toastEl.textContent=msg;
  if(!toastEl.parentNode) document.body.appendChild(toastEl);
  toastEl.style.display='block';
  if(toastTimer) clearTimeout(toastTimer);
  toastTimer=setTimeout(function(){ if(toastEl) toastEl.style.display='none'; }, 2200);
}

/* ---------- MAIN LOOP ---------- */
var lastTs=0;
function loop(ts){
  var dt = lastTs ? Math.min(60, ts-lastTs) : 16; lastTs=ts;
  update(dt); render(dt);
  if(typeof requestAnimationFrame==='function') requestAnimationFrame(loop);
}
function update(dt){
  game.ticker += dt;
  updateDialog(dt);
  if(game.mode==='room') moveOverworld(dt);
  else if(game.mode==='encounter'){ if(game.enc) game.enc.ticker0=(game.enc.ticker0||0)+dt/120; updateEncounter(dt); }
  else if(game.mode==='duel') updateDuel(dt);
}
function render(dt){
  if(!ctx) return;
  if(game.mode==='title'){ drawTitle(dt); return; }
  if(game.mode==='intro'){ px(0,0,W,H,'#0f0b08');
    // falling bean motif
    for(var i=0;i<starBeans.length;i++){ var b=starBeans[i]; b.y+=b.s*dt/30; if(b.y>H){b.y=0;b.x=Math.random()*W;} px(b.x,b.y,2,3,'#3c6e2a'); }
    drawDialogBox(); return;
  }
  if(game.mode==='room'){ if(game.room==='green') drawGreenRoom(); else drawDrumHall(); drawKulakBadge(); drawDialogBox(); return; }
  if(game.mode==='listen'){ drawListen(); drawKulakBadge(); drawDialogBox(); return; }
  if(game.mode==='encounter'){ drawEncounter(); drawKulakBadge(); drawDialogBox(); return; }
  if(game.mode==='duel'){ drawDuel(); drawKulakBadge(); drawDialogBox(); return; }
  if(game.mode==='end'){ px(0,0,W,H,'#0f0b08'); txt(T('ec_title'), W/2, 110, '#e6c14b', 14, 'center', true); return; }
}

/* ---------- LANGUAGE + CHIPS WIRING ---------- */
function setLang(l){
  game.lang = l;
  document.documentElement.lang = l;
  var tr=document.getElementById('langTr'), en=document.getElementById('langEn');
  if(tr) tr.classList.toggle('on', l==='tr');
  if(en) en.classList.toggle('on', l==='en');
  var mc=document.getElementById('muteChip'); if(mc) mc.textContent=T(game.muted?'mute_off':'mute_on');
  updateKulakHud();
  // live-swap open overlays
  if(!document.getElementById('ladderOverlay').classList.contains('hidden')) openLadder();
  if(game.mode==='end') showEndCard();
}
function wireUI(){
  var lt=document.getElementById('langTr'), le=document.getElementById('langEn');
  if(lt) lt.addEventListener('click', function(){ setLang('tr'); });
  if(le) le.addEventListener('click', function(){ setLang('en'); });
  var mc=document.getElementById('muteChip'); if(mc) mc.addEventListener('click', function(){ setMuted(!game.muted); });
  var rc=document.getElementById('refreshChip');
  if(rc) rc.addEventListener('click', function(){ location.href = location.pathname + '?v=' + Date.now(); });
  var lb=document.getElementById('ladderBack'); if(lb) lb.addEventListener('click', function(){ document.getElementById('ladderOverlay').classList.add('hidden'); });
  // dpad
  var dp=document.querySelectorAll('.dpad button[data-k]');
  Array.prototype.forEach.call(dp, function(btn){
    var k=btn.getAttribute('data-k');
    var down=function(ev){ if(ev&&ev.preventDefault) ev.preventDefault(); ensureAudio(); onDir(k,true); };
    var up=function(ev){ if(ev&&ev.preventDefault) ev.preventDefault(); onDir(k,false); };
    btn.addEventListener('touchstart', down, {passive:false}); btn.addEventListener('touchend', up, {passive:false});
    btn.addEventListener('mousedown', down); btn.addEventListener('mouseup', up); btn.addEventListener('mouseleave', up);
  });
  var ba=document.getElementById('btnA'); if(ba){ ba.addEventListener('click', function(ev){ ev.preventDefault(); ensureAudio(); onConfirm(); }); }
  var bb=document.getElementById('btnB'); if(bb){ bb.addEventListener('click', function(ev){ ev.preventDefault(); onCancel(); }); }
  // start audio on first touch anywhere
  document.addEventListener('touchstart', function once(){ ensureAudio(); if(AC&&AC.state==='suspended'&&AC.resume) AC.resume(); startMusic(); document.removeEventListener('touchstart', once); }, {passive:true});
}

/* ---------- BOOT ---------- */
function boot(){
  game.saveExists = hasSave();
  game.mode = 'title'; game.menuIdx = 0;
  setLang('tr'); setMuted(false);
  wireUI();
  if(typeof requestAnimationFrame==='function') requestAnimationFrame(loop);
}
if(typeof document!=='undefined'){
  if(document.readyState==='loading') document.addEventListener('DOMContentLoaded', boot);
  else boot();
}

window.__ROASTTALE__ = {
  game:game, S:S, T:T, DUEL:DUEL,
  agtronForSample:agtronForSample, cumGainForSample:cumGainForSample, agtronColor:agtronColor,
  setLang:setLang, boot:boot,
  newGame:newGame, continueGame:continueGame, enterGreenRoom:enterGreenRoom, enterDrumHall:enterDrumHall,
  hasSave:hasSave, doSave:doSave, loadSave:loadSave,
  startDialog:startDialog, advanceDialog:advanceDialog, updateDialog:updateDialog,
  interactById:function(id){ var l=roomInteractables(); for(var i=0;i<l.length;i++){ if(l[i].id===id){ l[i].action(); return true; } } return false; },
  startEncounter:startEncounter, encSelect:encSelect, encHit:encHit, setHP:function(h){ if(game.enc) game.enc.hp=h; },
  startWave:startWave, tamburSlice:tamburSlice, updateEncounter:updateEncounter, finishEncounter:finishEncounter,
  addKulak:addKulak, drillReward:drillReward, startPlaque:startPlaque, startDrill:startDrill,
  startCountDrill:startCountDrill, startSpeedDrill:startSpeedDrill, answerListen:answerListen,
  showStatsPanel:showStatsPanel, chapterProgress:chapterProgress,
  drawDuel:drawDuel, drawEncounter:drawEncounter, render:render, updateKulakHud:updateKulakHud,
  startDuel:startDuel, duelDrop:duelDrop, updateDuel:updateDuel,
  submitScore:submitScore, postScore:postScore, fetchLadderTop5:fetchLadderTop5,
  showEndCard:showEndCard,
  onDir:onDir, onConfirm:onConfirm
};
