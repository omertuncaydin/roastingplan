<!doctype html>
<html lang="tr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#f6f2ec">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<title>Cupping Exam</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
:root{color-scheme:light;
 --bg:#f6f2ec;--card:#fff;--ink:#2a2118;--mut:#8a7a68;--line:#ece2d4;
 --accent:#a35c1f;--green:#2c6a4a;--greenbg:#e6f2ea;--red:#b23b3b;--redbg:#fdeaea;}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0}
body{background:var(--bg);color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text",Segoe UI,Roboto,sans-serif;font-size:16px;line-height:1.45;
 padding:14px;padding-top:calc(14px + env(safe-area-inset-top));padding-bottom:calc(30px + env(safe-area-inset-bottom))}
.wrap{max-width:520px;margin:0 auto}
h1{font-size:22px;letter-spacing:-.3px;margin:4px 0 2px;font-weight:800}
.sub{color:var(--mut);font-size:13px;margin-bottom:14px}
.langrow{display:flex;justify-content:flex-end;gap:6px;margin-bottom:4px}
.lng{border:1px solid var(--line);background:#fff;color:#7a6a58;border-radius:10px;padding:6px 12px;font-size:13px;font-weight:800;cursor:pointer}
.lng.on{background:var(--accent);border-color:var(--accent);color:#fff}
.card{background:var(--card);border:1px solid var(--line);border-radius:18px;padding:16px;margin-bottom:14px;box-shadow:0 2px 10px rgba(60,40,20,.06)}
input[type=text]{width:100%;border:1px solid var(--line);border-radius:12px;padding:13px 14px;font-size:17px;background:#fff;margin-bottom:10px;-webkit-appearance:none}
.btn{border:none;border-radius:13px;padding:14px 16px;font-size:16px;font-weight:700;min-height:48px;cursor:pointer;width:100%;transition:transform .1s}
.btn:active{transform:scale(.98)}
.btn-go{background:var(--green);color:#fff}
.btn-go:disabled{background:#cbbfae;color:#fff}
.hint{color:var(--mut);font-size:13px;line-height:1.55;margin-top:8px}
.exTitle{font-size:17px;font-weight:800;color:var(--accent);margin:18px 2px 4px}
.ask{font-size:13px;font-weight:800;text-transform:uppercase;letter-spacing:.4px;margin:2px 0 8px}
.tri{margin-bottom:12px}
.trilbl{font-size:12px;font-weight:700;color:var(--mut);margin-bottom:6px}
.cups{display:flex;gap:8px}
.cup{flex:1;border:2px solid var(--line);background:#fffdf9;border-radius:14px;padding:16px 4px;font-size:21px;font-weight:800;text-align:center;font-variant-numeric:tabular-nums;cursor:pointer;transition:all .12s;color:var(--ink)}
.cup.on{border-color:var(--green);background:var(--greenbg);color:var(--green)}
.prog{position:sticky;top:calc(8px + env(safe-area-inset-top));z-index:5;background:var(--ink);color:#fff;border-radius:12px;padding:10px 14px;font-size:14px;font-weight:700;text-align:center;box-shadow:0 2px 10px rgba(0,0,0,.15);margin-bottom:12px}
.err{background:var(--redbg);color:var(--red);padding:12px;border-radius:12px;font-size:14px;margin-top:10px}
.ok{background:var(--greenbg);color:var(--green);padding:12px;border-radius:12px;font-size:14px;margin-top:10px;font-weight:600}
.toast{position:fixed;left:50%;transform:translateX(-50%);bottom:calc(24px + env(safe-area-inset-bottom));background:var(--ink);color:#fff;border-radius:14px;padding:12px 20px;font-size:14px;font-weight:600;opacity:0;transition:opacity .25s;pointer-events:none;z-index:20;max-width:88%}
.toast.show{opacity:1}
</style>
</head>
<body>
<div class="wrap">
<div class="langrow" style="justify-content:space-between;align-items:center"><span style="font-size:11px;color:var(--mut)">v2026-07-03b <button class="lng" onclick="hardRefresh()" style="margin-left:6px">&#8635;</button></span><span><button class="lng" id="lngTr" onclick="setLang('tr')">TR</button> <button class="lng" id="lngEn" onclick="setLang('en')">EN</button></span></div>

<div id="gate">
  <div class="card">
    <h1 id="gTitle"></h1>
    <div class="sub" id="gSub"></div>
    <input type="text" id="lname" autocomplete="name">
    <input type="text" id="ccode" autocapitalize="characters" autocomplete="off">
    <button class="btn btn-go" id="gStart" onclick="enter()"></button>
    <div class="err" id="gerr" style="display:none"></div>
    <div class="hint" id="gHint"></div>
  </div>
</div>

<div id="adminV" style="display:none">
  <div class="card" style="text-align:center">
    <h1>QR · Exam Room</h1>
    <div class="sub">guide.coffeenutz.net/exam-tri.html</div>
    <div id="qrbox" style="display:flex;justify-content:center;margin:14px 0"></div>
    <div class="hint" id="codeList" style="text-align:left"></div>
    <div class="hint">Show this screen or print it. Write the day's class code on the whiteboard only.</div>
  </div>
</div>

<div id="exam" style="display:none">
  <h1 id="modLabel"></h1>
  <div class="sub" id="who"></div>
  <div class="prog" id="prog"></div>
  <div id="sections"></div>
  <div class="card">
    <button class="btn btn-go" id="sendBtn" onclick="sendExam()" disabled></button>
    <div class="hint" id="sHint"></div>
    <div class="ok" id="sentOk" style="display:none"></div>
    <div class="err" id="serr" style="display:none"></div>
  </div>
</div>

</div>
<div class="toast" id="toast"></div>

<script>
// ---- class codes decide which exams show. Edit per cohort. ----
const CODES={
  'ROAST26':{label:'Roasting Bundle · Intermediate Cupping', exams:['EXAM3','EXAM4']}
  // future: 'PRO26':{label:'Roasting PRO', exams:[...]}, 'Q26':{label:'Q Class', exams:[...]}
};
const EXAMS={
  EXAM3:{title:'Exam 3', sections:[
    {ask:{en:'Choose the one that is NOT BAKED', tr:'Hangisi BAKED DEĞİL?'}, pre:'1', tris:[['771','803','287'],['781','191','653'],['324','673','449']]},
    {ask:{en:'Choose the one that is NOT FAST ROAST', tr:'Hangisi FAST ROAST DEĞİL?'}, pre:'2', tris:[['989','055','851'],['773','547','278'],['002','195','865']]}]},
  EXAM4:{title:'Exam 4', sections:[
    {ask:{en:'Choose the one that is NOT LIGHT ROAST', tr:'Hangisi LIGHT ROAST DEĞİL?'}, pre:'1', tris:[['473','376','944'],['781','919','653'],['177','308','572']]},
    {ask:{en:'Choose the one that is NOT DARK ROAST', tr:'Hangisi DARK ROAST DEĞİL?'}, pre:'2', tris:[['898','591','851'],['200','730','642'],['005','158','591']]}]}
};
const L={
 en:{title:'Cupping Exam',sub:'SCA triangulation. Calm palate, quiet mind.',name:'Your name',code:'Class code (on the board)',start:'Start',
     noName:'Write your name first.',badCode:'That code did not match. Check the board.',
     hint:'Taste all three cups in a triangle. One is different. Tap its code. Tap again to undo. You can change anything until you send.',
     answered:'answered',ready:'ready to send',send:'Send Exam',
     sendHint:'Sending saves your answers to the instructor and opens a PDF of your sheet to share. Nothing else to do; go rinse your spoon.',
     sending:'Sending...',done:'Done.',svErr:'Could not reach the server',svErr2:'Your PDF still works; share it with your instructor.',
     okDb:'Sent. Your answers are with the instructor. Well tasted.',okPdf:'Saved as PDF. Hand it to your instructor.',tri:'Triangle'},
 tr:{title:'Tadım Sınavı',sub:'SCA üçgen testi. Sakin damak, sakin zihin.',name:'Adınız',code:'Sınıf kodu (tahtada)',start:'Başla',
     noName:'Önce adınızı yazın.',badCode:'Kod eşleşmedi. Tahtaya bakın.',
     hint:'Üçgendeki üç fincanı da tadın. Biri farklı. Koduna dokunun. Geri almak için tekrar dokunun. Göndermeden önce her şeyi değiştirebilirsiniz.',
     answered:'cevaplandı',ready:'göndermeye hazır',send:'Sınavı Gönder',
     sendHint:'Gönderince cevaplarınız eğitmene kaydedilir ve paylaşmanız için sayfanızın PDF hali açılır. Başka iş yok; kaşığınızı çalkalayın.',
     sending:'Gönderiliyor...',done:'Tamam.',svErr:'Sunucuya ulaşılamadı',svErr2:'PDF yine de hazır; eğitmeninizle paylaşın.',
     okDb:'Gönderildi. Cevaplarınız eğitmende. İyi tattınız.',okPdf:'PDF kaydedildi. Eğitmeninize iletin.',tri:'Üçgen'}
};
const SUPA_URL="https://efjvfggwnhqkunjvoyjb.supabase.co";
const SUPA_KEY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVmanZmZ2d3bmhxa3VuanZveWpiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIzMTA5MDEsImV4cCI6MjA5Nzg4NjkwMX0.A42X5lr8bYarJZVjPmfb45oyVnWYREODF4a6Y7i_tDA";

let LANG=localStorage.getItem('exLang')||'tr';
let LEARNER='', CODE='', PICKS={}, TOTAL=0, SENT=false;
const $=id=>document.getElementById(id);
const T=k=>L[LANG][k];
function toast(m){ const t=$('toast'); t.textContent=m; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),2600); }

function hardRefresh(){ if(Object.keys(PICKS).length&&!SENT){ if(!confirm(LANG==='tr'?'Cevaplarınız silinir. Yenilensin mi?':'Your answers will be cleared. Refresh?')) return; } try{ location.href=location.href.split('?')[0]+'?v='+Date.now(); }catch(e){ location.reload(); } }
function setLang(l){ LANG=l; localStorage.setItem('exLang',l); applyLang(); }
function applyLang(){
  $('lngTr').classList.toggle('on',LANG==='tr'); $('lngEn').classList.toggle('on',LANG==='en');
  $('gTitle').textContent=T('title'); $('gSub').textContent=T('sub');
  $('lname').placeholder=T('name'); $('ccode').placeholder=T('code');
  $('gStart').textContent=T('start'); $('gHint').textContent=T('hint');
  $('sendBtn').textContent=T('send'); $('sHint').textContent=T('sendHint');
  if(CODE){ build(); }
}

const ADMIN_CODE='PATRON26';   // Ömer's QR/admin screen; change anytime
function enter(){
  LEARNER=$('lname').value.trim(); CODE=$('ccode').value.trim().toUpperCase();
  if(CODE===ADMIN_CODE){
    $('gate').style.display='none'; $('adminV').style.display='block';
    new QRCode($('qrbox'),{text:'https://guide.coffeenutz.net/exam-tri.html',width:280,height:280});
    $('codeList').innerHTML='<b>Active class codes:</b><br>'+Object.keys(CODES).map(k=>k+' · '+CODES[k].label).join('<br>');
    CODE=''; return;
  }
  if(!LEARNER){ gerr(T('noName')); return; }
  if(!CODES[CODE]){ gerr(T('badCode')); CODE=''; return; }
  $('gate').style.display='none'; $('exam').style.display='block';
  $('modLabel').textContent=CODES[CODE].label;
  $('who').textContent=LEARNER+' · '+new Date().toLocaleDateString('tr-TR');
  build();
}
function gerr(m){ $('gerr').textContent=m; $('gerr').style.display='block'; }

function build(){
  let h=''; TOTAL=0;
  for(const ek of CODES[CODE].exams){
    const ex=EXAMS[ek];
    h+='<div class="exTitle">'+ex.title+'</div>';
    ex.sections.forEach(sec=>{
      h+='<div class="card"><div class="ask">'+sec.ask[LANG]+'</div>';
      sec.tris.forEach((cups,i)=>{
        const key=ek+'|'+sec.pre+':'+(i+1); TOTAL++;
        h+='<div class="tri"><div class="trilbl">'+T('tri')+' '+sec.pre+':'+(i+1)+'</div><div class="cups">'+
          cups.map(c=>'<button class="cup'+(PICKS[key]===c?' on':'')+'" id="c_'+key+'_'+c+'" onclick="pick(\''+key+'\',\''+c+'\')">'+c+'</button>').join('')+'</div></div>';
      });
      h+='</div>';
    });
  }
  $('sections').innerHTML=h; updateProg();
}
function pick(key,cup){
  if(SENT) return;
  const prev=PICKS[key];
  if(prev===cup){ delete PICKS[key]; $('c_'+key+'_'+cup).classList.remove('on'); updateProg(); return; }   // second tap = undo
  if(prev) $('c_'+key+'_'+prev).classList.remove('on');
  PICKS[key]=cup; $('c_'+key+'_'+cup).classList.add('on');
  updateProg();
}
function updateProg(){
  const n=Object.keys(PICKS).length;
  $('prog').textContent=n+' / '+TOTAL+' '+T('answered')+(n===TOTAL?' · '+T('ready'):'');
  $('sendBtn').disabled=(n!==TOTAL)||SENT;
}

function buildPdf(){
  const { jsPDF }=window.jspdf; const doc=new jsPDF();
  let y=18;
  doc.setFontSize(15); doc.setFont(undefined,'bold');
  doc.text('CoffeeNutz Academy · Triangulation Exam',14,y); y+=9;
  doc.setFontSize(11); doc.setFont(undefined,'normal');
  doc.text('Learner: '+LEARNER,14,y); y+=6;
  doc.text('Class: '+CODES[CODE].label+' ('+CODE+')',14,y); y+=6;
  doc.text('Date: '+new Date().toLocaleString('tr-TR'),14,y); y+=10;
  for(const ek of CODES[CODE].exams){
    const ex=EXAMS[ek];
    doc.setFont(undefined,'bold'); doc.text(ex.title,14,y); y+=7; doc.setFont(undefined,'normal');
    ex.sections.forEach(sec=>{
      doc.text(sec.ask.en,14,y); y+=6;
      sec.tris.forEach((cups,i)=>{
        const key=ek+'|'+sec.pre+':'+(i+1);
        doc.text('  Triangle '+sec.pre+':'+(i+1)+'  ('+cups.join(' / ')+')   answer: '+(PICKS[key]||'-'),14,y); y+=6;
        if(y>270){ doc.addPage(); y=18; }
      });
      y+=3;
    });
    y+=3;
  }
  return doc;
}

async function sendExam(){
  if(SENT) return;
  $('sendBtn').disabled=true; toast(T('sending'));
  const payload={ learner:LEARNER, class_code:CODE, exam:CODES[CODE].exams.join('+'), answers:PICKS };
  let dbOk=false;
  try{
    const r=await fetch(SUPA_URL+'/rest/v1/exam_results',{method:'POST',
      headers:{'apikey':SUPA_KEY,'Authorization':'Bearer '+SUPA_KEY,'Content-Type':'application/json','Prefer':'return=minimal'},
      body:JSON.stringify(payload)});
    dbOk=r.ok;
    if(!r.ok) throw new Error('HTTP '+r.status);
  }catch(e){
    $('serr').textContent=T('svErr')+' ('+e.message+'). '+T('svErr2');
    $('serr').style.display='block';
  }
  try{
    const doc=buildPdf();
    const fname='exam-'+LEARNER.replace(/\s+/g,'_')+'-'+new Date().toISOString().slice(0,10)+'.pdf';
    const blob=doc.output('blob');
    const file=new File([blob],fname,{type:'application/pdf'});
    if(navigator.canShare && navigator.canShare({files:[file]})){
      await navigator.share({files:[file],title:'Cupping exam'});
    } else {
      const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download=fname; a.click();
    }
  }catch(e){ /* share sheet cancelled; fine */ }
  SENT=true;
  $('sentOk').textContent=dbOk?T('okDb'):T('okPdf');
  $('sentOk').style.display='block';
  toast(T('done'));
}

applyLang();
</script>
</body>
</html>
