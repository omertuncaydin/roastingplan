<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="robots" content="noindex">
<title>CoffeeNutz · App Hub</title>
<style>
:root{--bg:#1a1410;--panel:#241c16;--panel2:#201a15;--accent:#c98a3c;--accent2:#3c7a5a;--ink:#f3ede4;--muted:#a8998a;--line:#3a2f26;--red:#D8453B;--warn:#d9663f;--ok:#3c7a5a}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;-webkit-text-size-adjust:100%}
body{margin:0;background:var(--bg);color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,Segoe UI,Roboto,sans-serif;padding:18px;padding-bottom:48px}
.wrap{max-width:760px;margin:0 auto}
.brand{font-family:'Arial Black',Helvetica,sans-serif;font-size:22px;display:inline-block;white-space:nowrap}
.brand .lr{color:var(--red)}.brand .lg{color:var(--ink)}
h1{font-size:16px;font-weight:800;margin:14px 0 2px}
.sub{color:var(--muted);font-size:12px;margin-bottom:16px}
.hdrrow{display:flex;justify-content:space-between;align-items:center;gap:10px}
.iconbtn{width:auto;padding:6px 11px;font-size:12px;font-weight:600;background:transparent;color:var(--accent);border:1px solid var(--accent);border-radius:9px;cursor:pointer}
.divider{border-top:1px solid var(--line);margin:12px 0}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:12px}
.card{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:14px;cursor:pointer;transition:border-color .12s;display:flex;flex-direction:column;gap:6px;text-decoration:none;color:inherit}
.card:hover{border-color:var(--accent)}
.card{position:relative}
.grip{position:absolute;top:5px;right:5px;color:var(--muted);font-size:18px;cursor:grab;touch-action:none;padding:8px 10px;line-height:1;user-select:none;-webkit-user-select:none}
.grip:active{cursor:grabbing;color:var(--accent)}
.card.dragging{opacity:.92;border-color:var(--accent);transform:scale(1.04);box-shadow:0 10px 24px rgba(0,0,0,.5);z-index:5}
.ord{position:absolute;top:6px;right:6px;display:flex;gap:3px}
.ordbtn{width:28px;height:28px;padding:0;border:1px solid var(--line);background:var(--panel2);color:var(--muted);border-radius:7px;font-size:11px;cursor:pointer;line-height:1}
.ordbtn:active{background:var(--accent);color:#1a1410;border-color:var(--accent)}
.card .top{display:flex;align-items:center;gap:10px}
.badge{width:34px;height:34px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:15px;color:#1a1410;flex:none}
.nm{font-size:15px;font-weight:700}
.desc{font-size:12px;color:var(--muted);line-height:1.45;min-height:2.5em}
.meta{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-top:auto;padding-top:8px;font-size:11px;color:var(--muted)}
.card.st-live{border-color:#3c7a5a;background:#1c241d}
.card.st-developing{border-color:#D8453B;background:#241a18}
.card.st-passive{border-color:#57564f;background:#201f1d}
.stsel{background:var(--panel2);color:var(--ink);border:1px solid var(--line);border-radius:7px;font-size:11px;padding:3px 5px;color-scheme:dark;cursor:pointer}
.restore{margin-top:14px;font-size:11px;color:var(--muted)}
.restore a{color:var(--accent);text-decoration:none}
.dot{width:8px;height:8px;border-radius:50%;background:var(--muted);flex:none}
.dot.ok{background:var(--ok)}.dot.bad{background:var(--warn)}
.ver{font-variant-numeric:tabular-nums}
.grouplbl{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;font-weight:600;margin:18px 0 8px}
.gate{max-width:340px;margin:60px auto;text-align:center}
input{width:100%;background:var(--panel2);border:1px solid var(--line);color:var(--ink);border-radius:10px;padding:12px;font-size:16px;margin:10px 0}
button.go{width:100%;border:none;border-radius:11px;padding:13px;font-size:15px;font-weight:700;background:var(--accent2);color:#fff;cursor:pointer}
.linkish{background:none;border:none;color:var(--accent);font-size:12px;cursor:pointer;padding:6px}
</style>
</head>
<body>

<div id="gate" class="gate" style="display:none">
  <div class="brand"><span class="lr">CoffeeNutz</span> <span class="lg">Hub</span></div>
  <div class="sub" style="margin-top:8px">Admin only. Enter your cockpit key.</div>
  <input type="password" id="keyIn" placeholder="Cockpit key" autocomplete="off">
  <button class="go" onclick="unlock()">Open the hub</button>
</div>

<div id="app" class="wrap" style="display:none">
  <div class="hdrrow">
    <div class="brand"><span class="lr">CoffeeNutz</span> <span class="lg">Hub</span></div>
    <div style="display:flex;align-items:center;gap:8px">
      <span class="sub" style="margin:0">v2026-07-05h</span>
      <button class="iconbtn" onclick="loadAll()">Recheck</button>
      <button class="linkish" onclick="lock()">lock</button>
    </div>
  </div>
  <h1>Your apps</h1>
  <div class="sub">Tap a card to open. Version and reach are checked live.</div>
  <div id="grid" class="grid"></div>
  <div id="restore" class="restore"></div>

  <div class="grouplbl">External</div>
  <div id="ext" class="grid"></div>
  <div class="sub" style="margin-top:10px">Tell Claude the external apps to add (Shopify, Smartsheets, SEO Komuta file, anything) and they land here.</div>
</div>

<script>
const $=id=>document.getElementById(id);
// same-origin apps in this repo; version is read live from each page
const APPS=[
  {nm:'Guide',    path:'/roast-guide',    desc:'Roast · Cup · Grade guided cockpit',      b:'G', c:'#c98a3c'},
  {nm:'Crack Listener', path:'/crack-listen', desc:'The crack analyzer · BeanSpeak',           b:'C', c:'#3c7a5a'},
  {nm:'Council',  path:'/council',        desc:'Strategy council cockpit',                    b:'K', c:'#D8453B'},
  {nm:'Image Vault', path:'/vault',       desc:'Ideas in, photos in, verdicts out',           b:'V', c:'#8a6d3b'},
  {nm:'SEO Komuta', path:'/seo-komuta',   desc:'SEO command board',                           b:'S', c:'#5a7d3a'},
  {nm:'Q Exam',   path:'/exam-tri',       desc:'Cupping exam · classroom QR',             b:'Q', c:'#b9742f'},
  {nm:'Roast Planner', path:'/roast-planner', desc:'Roast planning',                          b:'R', c:'#c98a3c'},
  {nm:'Gain Controller', path:'/gain-controller', desc:'Gain controller',                     b:'Γ', c:'#8a4f26'},
  {nm:'Q Ready',  path:'/q-ready',        desc:'Q readiness',                                 b:'✓', c:'#3c7a5a'},
  {nm:'Grup-Al Admin', path:'/grupal-admin', desc:'Group-buy campaign admin',                 b:'GA', c:'#b9742f'},
  {nm:'Procurement Manager', path:'/procurement-manager', desc:'Procurement management',       b:'PM', c:'#5a7d3a'},
  {nm:'Claude Management', path:'/claude-management', desc:'Claude / ops management',           b:'CM', c:'#8a6d3b'},
  {nm:'Landing Forge', path:'/landing-forge', desc:'Landing page builder',                      b:'LF', c:'#c98a3c'}
];
// external apps (cross-origin: link only, no live version). Add per Ömer.
const EXT=[];

function unlock(){ const k=$('keyIn').value.trim(); if(!k) return; localStorage.setItem('ccKey',k); show(); }
function lock(){ localStorage.removeItem('ccKey'); location.reload(); }
function show(){ $('gate').style.display='none'; $('app').style.display='block'; render(); loadAll(); }

function card(a,external){
  const p=a.path||a.url;
  const st=external?'passive':getStatus(p);
  const el=document.createElement('div'); el.className='card st-'+st; el.dataset.path=p; el.dataset.ext=external?'1':'';
  el.onclick=()=>openApp(p,external);
  const sel=external?'':'<select class="stsel" onchange="changeStatus(\''+p+'\',this.value)" onclick="event.stopPropagation()"><option value="live"'+(st==='live'?' selected':'')+'>Live</option><option value="developing"'+(st==='developing'?' selected':'')+'>Developing</option><option value="passive"'+(st==='passive'?' selected':'')+'>Passive</option></select>';
  el.innerHTML=(external?'':'<div class="ord"><button class="ordbtn" title="move back" onclick="moveApp(event,\''+p+'\',-1)">&#9664;</button><button class="ordbtn" title="move forward" onclick="moveApp(event,\''+p+'\',1)">&#9654;</button></div>')+
    '<div class="top"><div class="badge" style="background:'+(a.c||'#c98a3c')+'">'+a.b+'</div><div class="nm">'+a.nm+'</div></div>'+
    '<div class="desc">'+a.desc+'</div>'+
    '<div class="meta"><span class="ver" id="v_'+p+'">'+(external?'external':'…')+'</span>'+sel+'</div>';
  return el;
}
function getStatus(p){ try{ return (JSON.parse(localStorage.getItem('hubStatus')||'{}'))[p]||'live'; }catch(e){ return 'live'; } }
function changeStatus(p,val){ if(val==='delete'){ if(!confirm('Remove this app from the hub? You can restore it from the footer link.')){ const s=$('grid').querySelector('.card[data-path="'+p+'"] .stsel'); if(s) s.value=getStatus(p); return; } const d=getDeleted(); if(!d.includes(p)){ d.push(p); setDeleted(d); } const c=$('grid').querySelector('.card[data-path="'+p+'"]'); if(c) c.remove(); renderRestore(); return; } let m={}; try{ m=JSON.parse(localStorage.getItem('hubStatus')||'{}'); }catch(e){} m[p]=val; localStorage.setItem('hubStatus',JSON.stringify(m)); const c=$('grid').querySelector('.card[data-path="'+p+'"]'); if(c){ c.classList.remove('st-live','st-developing','st-passive'); c.classList.add('st-'+val); } }
function getDeleted(){ try{ return JSON.parse(localStorage.getItem('hubDeleted')||'[]'); }catch(e){ return []; } }
function setDeleted(arr){ localStorage.setItem('hubDeleted', JSON.stringify(arr)); }
function renderRestore(){ const el=$('restore'); if(!el) return; const d=getDeleted(); el.innerHTML=d.length?(d.length+' hidden · <a href="#" onclick="restoreAll();return false">restore all</a>'):''; }
function restoreAll(){ setDeleted([]); render(); loadAll(); }
function getOrder(){ try{ return JSON.parse(localStorage.getItem('hubOrder')||'[]'); }catch(e){ return []; } }
function saveOrder(paths){ localStorage.setItem('hubOrder', JSON.stringify(paths)); }
function orderedApps(){ const del=getDeleted(), ord=getOrder(), map={}; APPS.forEach(a=>{ if(!del.includes(a.path)) map[a.path]=a; }); const out=[]; ord.forEach(p=>{ if(map[p]){ out.push(map[p]); delete map[p]; } }); APPS.forEach(a=>{ if(map[a.path]) out.push(a); }); return out; }
let justDragged=0;
function openApp(dest,external){ if(Date.now()-justDragged<300) return; if(external) window.open(dest,'_blank'); else location.href=dest; }
function startDrag(e,path){ e.preventDefault(); e.stopPropagation(); const g=$('grid').querySelector('.card[data-path="'+path+'"]'); if(!g) return; g.classList.add('dragging'); const grip=e.target; try{ grip.setPointerCapture(e.pointerId); }catch(_){ } grip.onpointermove=onDrag; grip.onpointerup=function(){ grip.onpointermove=null; grip.onpointerup=null; endDrag(); }; }
function onDrag(e){ e.preventDefault(); const dragged=$('grid').querySelector('.card.dragging'); if(!dragged) return; const cards=[...$('grid').querySelectorAll('.card')].filter(c=>c!==dragged); let best=null,bd=Infinity; for(const c of cards){ const r=c.getBoundingClientRect(); const dx=e.clientX-(r.left+r.width/2), dy=e.clientY-(r.top+r.height/2); const d=dx*dx+dy*dy; if(d<bd){ bd=d; best=c; } } if(best){ const r=best.getBoundingClientRect(); const before = e.clientY < r.top+r.height/2-2 || (Math.abs(e.clientY-(r.top+r.height/2))<=r.height/2 && e.clientX < r.left+r.width/2); best.parentNode.insertBefore(dragged, before?best:best.nextSibling); } }
function endDrag(){ const dragged=$('grid').querySelector('.card.dragging'); if(dragged) dragged.classList.remove('dragging'); justDragged=Date.now(); saveOrder([...$('grid').querySelectorAll('.card')].map(c=>c.dataset.path)); }
function moveApp(e,path,dir){ if(e) e.stopPropagation(); justDragged=Date.now(); const cards=[...$('grid').querySelectorAll('.card')]; const i=cards.findIndex(c=>c.dataset.path===path), j=i+dir; if(i<0||j<0||j>=cards.length) return; const a=cards[i], nb=cards[j]; if(dir>0) a.parentNode.insertBefore(nb,a); else a.parentNode.insertBefore(a,nb); saveOrder([...$('grid').querySelectorAll('.card')].map(c=>c.dataset.path)); }
function render(){
  const g=$('grid'); g.innerHTML=''; orderedApps().forEach(a=>g.appendChild(card(a,false)));
  const e=$('ext'); e.innerHTML=''; if(!EXT.length){ e.innerHTML='<div class="sub" style="grid-column:1/-1;margin:0">None yet.</div>'; } else EXT.forEach(a=>e.appendChild(card(a,true)));
  renderRestore();
}
async function checkVer(a){
  const ver=$('v_'+a.path); if(!ver) return;
  try{
    const r=await fetch(a.path,{cache:'no-store'});
    if(!r.ok){ ver.textContent='—'; return; }
    const t=await r.text(); const m=t.match(/v20\d\d-\d\d-\d\d[a-z]?/);
    ver.textContent=m?m[0]:'—';
  }catch(e){ ver.textContent='—'; }
}
function loadAll(){ APPS.forEach(a=>{ const v=$('v_'+a.path); if(v) v.textContent='…'; checkVer(a); }); }

// soft admin gate: reuses the cockpit key stored by the other tools
if(localStorage.getItem('ccKey')) show(); else $('gate').style.display='block';
</script>
</body>
</html>
