<!doctype html>
<html lang="tr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#f6f2ec">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<title>Q-Readiness · CoffeeNutz Academy</title>
<meta name="description" content="Q Grader olmaya ne kadar hazırsın? Evde 15 dakikalık damak ve pazar-okuma taraması. CoffeeNutz Academy Q-Prep.">
<style>
:root{color-scheme:light;
 --bg:#f6f2ec;--card:#fff;--ink:#2a2118;--mut:#8a7a68;--line:#ece2d4;
 --accent:#a35c1f;--green:#2c6a4a;--greenbg:#e6f2ea;--red:#b23b3b;--gold:#e6c14b;}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0}
body{background:var(--bg);color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text",Segoe UI,Roboto,sans-serif;font-size:16px;line-height:1.5;
 padding:14px;padding-top:calc(14px + env(safe-area-inset-top));padding-bottom:calc(30px + env(safe-area-inset-bottom))}
.wrap{max-width:560px;margin:0 auto}
h1{font-size:24px;letter-spacing:-.3px;margin:6px 0 2px;font-weight:800}
h2{font-size:17px;margin:0 0 8px}
.sub{color:var(--mut);font-size:13.5px;margin-bottom:14px}
.langrow{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px}
.lng{border:1px solid var(--line);background:#fff;color:#7a6a58;border-radius:10px;padding:6px 12px;font-size:13px;font-weight:800;cursor:pointer}
.lng.on{background:var(--accent);border-color:var(--accent);color:#fff}
.card{background:var(--card);border:1px solid var(--line);border-radius:18px;padding:16px;margin-bottom:14px;box-shadow:0 2px 10px rgba(60,40,20,.06)}
.fk{border-left:4px solid var(--gold);padding:10px 14px;background:#fdf7ec;border-radius:10px;font-weight:600;font-size:14.5px;margin:8px 0}
.btn{border:none;border-radius:13px;padding:14px 16px;font-size:16px;font-weight:700;min-height:48px;cursor:pointer;width:100%;transition:transform .1s}
.btn:active{transform:scale(.98)}
.btn-go{background:var(--green);color:#fff}
.btn-go:disabled{background:#cbbfae;color:#fff}
.hint{color:var(--mut);font-size:13px;line-height:1.55;margin-top:8px}
.step{font-size:12px;font-weight:800;color:var(--accent);text-transform:uppercase;letter-spacing:.6px;margin-bottom:4px}
.cups{display:flex;gap:8px;margin-top:8px}
.cup{flex:1;border:2px solid var(--line);background:#fffdf9;border-radius:14px;padding:16px 4px;font-size:19px;font-weight:800;text-align:center;cursor:pointer;transition:all .12s}
.cup.on{border-color:var(--green);background:var(--greenbg);color:var(--green)}
.likert{display:flex;gap:6px;margin-top:8px}
.lk{flex:1;border:2px solid var(--line);background:#fffdf9;border-radius:10px;padding:10px 2px;font-size:15px;font-weight:800;text-align:center;cursor:pointer}
.lk.on{border-color:var(--accent);background:#fdf3e2;color:var(--accent)}
.q{font-size:14.5px;font-weight:600;margin-top:14px}
.score{font-size:56px;font-weight:800;text-align:center;letter-spacing:-1px}
.band{text-align:center;font-weight:800;font-size:15px;margin-bottom:10px}
.gap{border-top:1px solid var(--line);padding:10px 0;font-size:14px}
.gap b{color:var(--accent)}
.seed{font-size:16px;font-weight:700;text-align:center;padding:14px;background:#fdf7ec;border:1px solid #eeddbd;border-radius:14px;margin:12px 0;line-height:1.5}
.toast{position:fixed;left:50%;transform:translateX(-50%);bottom:calc(24px + env(safe-area-inset-bottom));background:var(--ink);color:#fff;border-radius:14px;padding:12px 20px;font-size:14px;font-weight:600;opacity:0;transition:opacity .25s;pointer-events:none;z-index:20}
.toast.show{opacity:1}
a.apply{display:block;text-align:center;background:var(--accent);color:#fff;border-radius:13px;padding:15px;font-weight:800;text-decoration:none;font-size:16px}
</style>
</head>
<body>
<div class="wrap">
<div class="langrow"><span style="font-size:11px;color:var(--mut)">v2026-07-04a</span><span><button class="lng on" id="lTr" onclick="setL('tr')">TR</button> <button class="lng" id="lEn" onclick="setL('en')">EN</button></span></div>

<div id="pIntro">
  <h1 id="t1"></h1>
  <div class="sub" id="t2"></div>
  <div class="card">
    <div class="fk" id="fk1"></div>
    <div class="fk" id="fk2"></div>
    <div class="hint" id="t3"></div>
    <button class="btn btn-go" style="margin-top:12px" id="startBtn" onclick="go('pSetup')"></button>
  </div>
</div>

<div id="pSetup" style="display:none">
  <div class="card">
    <div class="step" id="s0"></div>
    <h2 id="t4"></h2>
    <div class="hint" id="t5"></div>
    <button class="btn btn-go" style="margin-top:12px" onclick="go('pTri')" id="t6"></button>
  </div>
</div>

<div id="pTri" style="display:none"></div>

<div id="pSelf" style="display:none"></div>

<div id="pResult" style="display:none"></div>

</div>
<div class="toast" id="toast"></div>

<script>
const SUPA_URL="https://efjvfggwnhqkunjvoyjb.supabase.co";
const SUPA_KEY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVmanZmZ2d3bmhxa3VuanZveWpiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIzMTA5MDEsImV4cCI6MjA5Nzg4NjkwMX0.A42X5lr8bYarJZVjPmfb45oyVnWYREODF4a6Y7i_tDA";
const APPLY_URL="https://www.coffeenutz.net/products/q-grader";

const L={
tr:{
 t1:'Q-Readiness Taraması', t2:'CoffeeNutz Academy · Q-Prep · evde ~15 dakika',
 fk1:'Kimse sınavımıza soğuk oturmaz: adaylarımız kalibre gelir.',
 fk2:'Sınavı İngilizcenle değil, damağınla verirsin.',
 t3:'Bu tarama iki şeyi ölçer: üçgen testiyle ayrım gücünü ve pazarını okuma becerini. Sonunda Q-Readiness puanını ve eksik haritanı alırsın. Ev tipi bir taramadır; gerçek kalibrasyon Q-Prep sürecinde ölçülür.',
 start:'Başla',
 s0:'Kurulum', t4:'İki kahve, dokuz fincan',
 t5:'Farklı iki kahve seç (A ve B). Dört üçgen kur: her üçgende iki fincan aynı, biri farklı olsun. Fincanların altına A/B yaz, bir arkadaşına karıştırt ya da gözün kapalıyken kendin karıştır. Tat; her üçgende FARKLI olanı seç. Sonra fincan altlarına bakıp doğru/yanlışı işaretle.',
 t6:'Üçgenler hazır',
 tri:'Üçgen', pick:'Farklı olan hangisiydi? Fincan altına bak: doğru muydu?', right:'Doğru', wrong:'Yanlış',
 selfTitle:'Pazar okuma · kendine karşı dürüst ol',
 sq:[ 'Son çıkardığın kahvede hangi müşteri segmentinin nasıl tepki vereceğini önceden yazdın mı ve tuttu mu?',
      'Aynı kahvede iki farklı segmentin (örn. 3. dalga müdavimi vs süt bazlı içici) farklı sevdiği şeyi tarif edebilir misin?',
      'Kendi zevkinle müşterinin zevkini AYRI puanlayabiliyor musun?',
      'Bir kahveyi tatmadan, kavurma bilgisinden fincanı öngörebiliyor musun?',
      'Alım kararı verirken damağına mı, tedarikçinin sözüne mi güveniyorsun?'],
 lk:['Hiç','Nadiren','Bazen','Çoğunlukla','Her zaman'],
 see:'Sonucu gör',
 res:'Q-Readiness', of:'/ 100',
 bands:[[80,'Q-hazır bölgedesin: sınıf seni bekliyor.'],[60,'Yakınsın: Q-Prep tam bu araları kapatmak için var.'],[0,'Ham yetenek ölçülemez; kalibrasyon öğrenilir. Başlangıç noktan burası.']],
 gapT:'Eksik haritan',
 gTri:'Ayrım gücü: üçgenlerde', gTriB:'/4. Q-Prep referans kahveleri tam bunu çalıştırır.',
 gMkt:'Pazar okuma:', gMktB:'/25. Damağın kendi zevkini ölçüyor. Pazarını ölçmeyi Q öğretir.',
 seed:'Damağın kendi zevkini ölçüyor.<br>Pazarını ölçmeyi Q öğretir.',
 apply:'Q’26 başvurusu', again:'Yeniden tara',
 name:'Adın (istersen)', send:'Sonucumu Academy’ye gönder', sent:'Gönderildi. Görüşmek üzere.'
},
en:{
 t1:'Q-Readiness Screening', t2:'CoffeeNutz Academy · Q-Prep · ~15 minutes at home',
 fk1:'Nobody sits our exam cold: our candidates arrive calibrated.',
 fk2:'EMEA cohort, native-instructor room: the same seats trained a Starbucks Reserve roaster.',
 t3:'This screening measures two things: discrimination power via triangulation, and how well you read your market. You get a Q-Readiness score and a gap map. It is a home screening; real calibration is measured in Q-Prep.',
 start:'Start',
 s0:'Setup', t4:'Two coffees, nine cups',
 t5:'Pick two different coffees (A and B). Build four triangles: two cups the same, one different. Mark cup bottoms A/B, have a friend shuffle (or shuffle blind yourself). Taste; pick the ODD cup in each triangle. Then check the bottoms and mark right/wrong.',
 t6:'Triangles ready',
 tri:'Triangle', pick:'Which was the odd one? Check the bottom: were you right?', right:'Right', wrong:'Wrong',
 selfTitle:'Market reading · be honest with yourself',
 sq:[ 'On your last launch, did you predict each segment’s reaction in writing, and did it hold?',
      'Can you describe what two different segments love differently in the same coffee?',
      'Can you score your own taste and your customer’s taste SEPARATELY?',
      'Can you predict the cup from roast data before tasting?',
      'When buying greens, do you trust your palate or the supplier’s word?'],
 lk:['Never','Rarely','Sometimes','Mostly','Always'],
 see:'See my result',
 res:'Q-Readiness', of:'/ 100',
 bands:[[80,'You are in the Q-ready zone: the room is waiting.'],[60,'Close: Q-Prep exists exactly for these gaps.'],[0,'Raw talent is unmeasured, calibration is learned. This is your starting point.']],
 gapT:'Your gap map',
 gTri:'Discrimination: triangles', gTriB:'/4. Q-Prep reference coffees train exactly this.',
 gMkt:'Market reading:', gMktB:'/25. Your palate scores your taste. Q teaches it to score your market.',
 seed:'Your palate scores your own taste.<br>Q teaches it to score your market.',
 apply:'Apply · Q’26', again:'Screen again',
 name:'Your name (optional)', send:'Send my result to the Academy', sent:'Sent. See you at the table.'
}};
let LG=localStorage.getItem('qrLang')||'tr';
let TRI=[null,null,null,null], SELF=[0,0,0,0,0], SENTF=false;
const $=id=>document.getElementById(id);
const T=k=>L[LG][k];
function toast(m){ const t=$('toast'); t.textContent=m; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),2400); }
function setL(l){ LG=l; localStorage.setItem('qrLang',l); apply(); }
function apply(){
  $('lTr').classList.toggle('on',LG==='tr'); $('lEn').classList.toggle('on',LG==='en');
  ['t1','t2','fk1','fk2','t3','s0','t4','t5'].forEach(k=>$(k).innerHTML=T(k));
  $('startBtn').textContent=T('start'); $('t6').textContent=T('t6');
  renderTri(); renderSelf(); if($('pResult').style.display!=='none') renderResult();
}
function go(p){ ['pIntro','pSetup','pTri','pSelf','pResult'].forEach(x=>$(x).style.display=x===p?'block':'none'); window.scrollTo(0,0); }
function renderTri(){
  let h='<div class="card"><div class="step">'+T('s0')+' 2/3</div><h2>'+T('pick')+'</h2>';
  for(let i=0;i<4;i++){
    h+='<div class="q">'+T('tri')+' '+(i+1)+'</div><div class="cups">'+
      '<button class="cup'+(TRI[i]===1?' on':'')+'" onclick="tri('+i+',1)">'+T('right')+'</button>'+
      '<button class="cup'+(TRI[i]===0?' on':'')+'" onclick="tri('+i+',0)">'+T('wrong')+'</button></div>';
  }
  h+='<button class="btn btn-go" style="margin-top:14px" onclick="go(\'pSelf\')" '+(TRI.includes(null)?'disabled':'')+'>'+T('selfTitle')+' →</button></div>';
  $('pTri').innerHTML=h;
}
function tri(i,v){ TRI[i]=v; renderTri(); }
function renderSelf(){
  let h='<div class="card"><div class="step">'+T('s0')+' 3/3</div><h2>'+T('selfTitle')+'</h2>';
  T('sq').forEach((q,i)=>{
    h+='<div class="q">'+q+'</div><div class="likert">'+
      [1,2,3,4,5].map(v=>'<button class="lk'+(SELF[i]===v?' on':'')+'" onclick="slf('+i+','+v+')">'+v+'</button>').join('')+'</div>';
  });
  h+='<div class="hint">1 = '+T('lk')[0]+' · 5 = '+T('lk')[4]+'</div>';
  h+='<button class="btn btn-go" style="margin-top:14px" onclick="finish()" '+(SELF.includes(0)?'disabled':'')+'>'+T('see')+'</button></div>';
  $('pSelf').innerHTML=h;
}
function slf(i,v){ SELF[i]=v; renderSelf(); }
function calc(){
  const triPts=TRI.filter(x=>x===1).length;             // 0-4
  const mkt=SELF.reduce((a,b)=>a+b,0);                   // 5-25
  const score=Math.round(triPts*15 + (mkt-5)*2);         // 0-100
  return {triPts, mkt, score:Math.min(100,score)};
}
function finish(){ renderResult(); go('pResult'); saveRow(); }
function renderResult(){
  const r=calc();
  const band=T('bands').find(b=>r.score>=b[0])[1];
  let h='<div class="card"><div class="step">'+T('res')+'</div>'+
    '<div class="score">'+r.score+'<span style="font-size:22px;color:var(--mut)"> '+T('of')+'</span></div>'+
    '<div class="band">'+band+'</div>'+
    '<div class="step" style="margin-top:10px">'+T('gapT')+'</div>'+
    '<div class="gap"><b>'+T('gTri')+' '+r.triPts+T('gTriB')+'</b></div>'+
    '<div class="gap"><b>'+T('gMkt')+' '+r.mkt+T('gMktB')+'</b></div>'+
    '<div class="seed">'+T('seed')+'</div>'+
    '<a class="apply" href="'+APPLY_URL+'">'+T('apply')+'</a>'+
    '<input type="text" id="qrName" placeholder="'+T('name')+'" style="width:100%;border:1px solid var(--line);border-radius:12px;padding:12px;font-size:16px;margin-top:12px">'+
    '<button class="btn" style="margin-top:8px;background:#f1eae0;color:#5a4a38" onclick="saveRow(true)">'+T('send')+'</button>'+
    '<button class="btn" style="margin-top:8px;background:none;color:var(--mut)" onclick="location.reload()">'+T('again')+'</button>'+
    '</div>';
  $('pResult').innerHTML=h;
}
async function saveRow(manual){
  if(SENTF&&!manual) return;
  const r=calc();
  try{
    await fetch(SUPA_URL+'/rest/v1/exam_results',{method:'POST',
      headers:{'apikey':SUPA_KEY,'Authorization':'Bearer '+SUPA_KEY,'Content-Type':'application/json','Prefer':'return=minimal'},
      body:JSON.stringify({learner:($('qrName')&&$('qrName').value.trim())||'anonymous', class_code:'QDIAG', exam:'QREADY', answers:{tri:TRI,self:SELF,score:r.score,lang:LG}})});
    SENTF=true; if(manual) toast(T('sent'));
  }catch(e){ if(manual) toast('offline'); }
}
apply();
</script>
</body>
</html>
