<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="robots" content="noindex,nofollow">
<title>Crack Watch · CoffeeNutz</title>
<style>
:root{--bg:#191512;--panel:#221c15;--line:#3a3128;--ink:#f3ede4;--muted:#a8998a;--dim:#8a7a68;--gold:#e6c14b;--warn:#e24b4a;--drop:#e07a6a}
html,body{margin:0;height:100%}
body{background:var(--bg);color:var(--ink);font-family:-apple-system,'Helvetica Neue',Helvetica,Arial,sans-serif;display:flex;align-items:center;justify-content:center;transition:background .4s}
body.a0pre #a0strip,body.tpre #a0strip,body.tnow #a0strip{display:block}
body.a0now{background:#3d2b10}
body.tpre #a0strip{border-color:var(--warn);color:var(--warn)}
body.tnow #a0strip{background:var(--warn);border-color:var(--warn);color:#fff;animation:pulse 1.1s ease-out infinite}
body.tnow #btnD{background:var(--warn);color:#fff;border-color:var(--warn);animation:pulse 1.1s ease-out infinite}
.card{text-align:center;padding:12px 14px;max-width:300px;width:100%}
#coffee{font-size:13px;color:var(--muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
#a0strip{display:none;background:none;border:1px solid var(--gold);color:var(--gold);border-radius:12px;padding:5px 8px;font-size:12.5px;font-weight:700;margin:6px 0 0}
body.a0now #a0strip{display:block;background:var(--gold);color:#1a1410;animation:pulse 1.1s ease-out infinite}
@keyframes pulse{0%{opacity:1}50%{opacity:.65}100%{opacity:1}}
#gwrap{position:relative;width:170px;height:100px;margin:4px auto 0}
#garc{transition:stroke-dashoffset 1.1s linear}
#proj{position:absolute;top:42px;left:0;right:0;font-size:29px;font-weight:800;line-height:1;letter-spacing:.5px}
#projLbl{position:absolute;top:74px;left:0;right:0;font-size:10px;color:#8a7a68;letter-spacing:1px}
#meta{font-size:12.5px;color:var(--muted);margin-top:-2px}
#meta b{color:var(--gold)}
#meta2{font-size:11.5px;color:var(--dim);margin-top:2px}
#btns{display:flex;gap:8px;margin-top:12px}
#btnS{flex:1.6;background:var(--gold);color:#1a1410;border:none;border-radius:14px;padding:13px 0;font-size:15px;font-weight:800;cursor:pointer}
body.a0now #btnS{animation:pulse 1.1s ease-out infinite}
#btnD{flex:1;background:#2a1512;color:var(--drop);border:1px solid #5a2b22;border-radius:14px;padding:8px 0 6px;font-size:13px;font-weight:700;cursor:pointer}
#btnD small{display:block;font-size:9px;font-weight:500;color:#a06055}
#btnD.armed{background:var(--warn);color:#fff}
button:disabled{opacity:.35}
#state{font-size:12px;color:var(--dim);margin-top:10px}
body.stale .fade{opacity:.35}
</style>
</head>
<body>
<div class="card">
  <div class="fade" id="coffee">·</div>
  <div id="a0strip">·</div>
  <div class="fade" id="gwrap">
    <svg viewBox="0 0 170 100" width="170" aria-hidden="true">
      <path d="M17 88 A68 68 0 0 1 153 88" fill="none" stroke="#3a3128" stroke-width="10" stroke-linecap="round"/>
      <path id="garc" d="M17 88 A68 68 0 0 1 153 88" fill="none" stroke="#e6c14b" stroke-width="10" stroke-linecap="round" stroke-dasharray="213.6" stroke-dashoffset="213.6"/>
    </svg>
    <div id="proj">·</div>
    <div id="projLbl">AGTRON · ÖNGÖRÜ</div>
  </div>
  <div class="fade" id="meta"></div>
  <div class="fade" id="meta2"></div>
  <div id="btns">
    <button id="btnS" onclick="sendSample()">NUMUNE</button>
    <button id="btnD" onclick="tapDrop()">DROP<small id="dHint">2x dokun</small></button>
  </div>
  <div id="state">bağlanıyor…</div>
</div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script>
const $=id=>document.getElementById(id);
const SU='https://efjvfggwnhqkunjvoyjb.supabase.co';
const AK='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVmanZmZ2d3bmhxa3VuanZveWpiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIzMTA5MDEsImV4cCI6MjA5Nzg4NjkwMX0.A42X5lr8bYarJZVjPmfb45oyVnWYREODF4a6Y7i_tDA';
const KEY=new URLSearchParams(location.search).get('k');
const ARC=213.6;
let LASTMSG=0, FIN=false, LIVE=false, DROPARM=0;
function cmd(a){ return fetch(SU+'/realtime/v1/api/broadcast',{method:'POST',headers:{apikey:AK,authorization:'Bearer '+AK,'content-type':'application/json'},
  body:JSON.stringify({messages:[{topic:'cnw-'+KEY, event:'cmd', payload:{a}, private:false}]})}); }
function render(p){
  LASTMSG=Date.now(); document.body.classList.remove('stale');
  FIN=!!p.fin; LIVE=!FIN;
  $('coffee').textContent=p.c||'?';
  if(p.proj!=null) $('proj').textContent=(p.band!=null)?((p.proj-p.band)+'-'+(p.proj+p.band)):('~'+p.proj);
  else if($('proj').textContent==='') $('proj').textContent='·';
  $('meta').innerHTML='<b>'+(p.st||'·')+'</b> · '+fmtT(p.t||0);
  $('meta2').textContent=(p.n||0)+' çatlak';
  if(FIN) $('garc').style.strokeDashoffset=0;
  else if(typeof p.p==='number') $('garc').style.strokeDashoffset=ARC*(1-Math.min(1,p.p));
  document.body.classList.toggle('a0pre',p.w===1);
  document.body.classList.toggle('a0now',p.w===2);
  if('g' in p){ document.body.classList.toggle('tpre',p.g===1); document.body.classList.toggle('tnow',p.g===2); }
  if(p.w===2) $('a0strip').textContent='A0 BAŞLADI · NUMUNEYİ ŞİMDİ ÇEK';
  else if(p.w===1) $('a0strip').textContent='A0 yakın · numuneye hazırlan';
  else if(p.g===2) $('a0strip').textContent='HEDEF RENK · DROP ZAMANI';
  else if(p.g===1) $('a0strip').textContent="hedef renk yaklaşıyor · drop'a hazırlan";
  $('btnS').disabled=$('btnD').disabled=!LIVE;
  $('state').textContent=FIN?'drop · kayıt bitti':(p.hb?'kayıt sürüyor · projeksiyon bekliyor':'canlı');
}
window.render=render;
function fmtT(t){ return Math.floor(t/60)+':'+('0'+Math.floor(t%60)).slice(-2); }
function fresh(){ return LIVE&&Date.now()-LASTMSG<=5000; }
function sendSample(){ if(!fresh()) return;
  try{ cmd('sample').catch(()=>{}); flash('numune gönderildi ✓'); }catch(e){} }
function tapDrop(){ if(!fresh()) return;
  const now=Date.now();
  if(now-DROPARM>2500){ DROPARM=now; $('btnD').classList.add('armed'); $('dHint').textContent='emin misin? tekrar';
    setTimeout(()=>{ if(Date.now()-DROPARM>=2400){ $('btnD').classList.remove('armed'); $('dHint').textContent='2x dokun'; } },2600); return; }
  DROPARM=0; $('btnD').classList.remove('armed'); $('dHint').textContent='2x dokun';
  try{ cmd('drop').catch(()=>{}); flash('drop gönderildi ✓'); }catch(e){} }
function flash(msg){ $('state').textContent=msg; document.body.style.outline='3px solid var(--gold)';
  setTimeout(()=>{ document.body.style.outline='none'; },600); }
setInterval(()=>{ if(!FIN&&LASTMSG&&Date.now()-LASTMSG>10000){ document.body.classList.add('stale'); LIVE=false;
  $('btnS').disabled=$('btnD').disabled=true; $('state').textContent='sinyal bekleniyor…'; } },2000);
if(!KEY){ $('state').textContent='link eksik: Listener > ayar & iz > Watch yayını'; }
else if(typeof supabase==='undefined'){ $('state').textContent='bağlantı kitaplığı yüklenemedi'; }
else{
  try{
    const sb=supabase.createClient(SU,AK);
    sb.channel('cnw-'+KEY).on('broadcast',{event:'live'},m=>render(m.payload||{})).subscribe(st=>{
      if(st==='SUBSCRIBED') $('state').textContent='bağlı · kavurma bekleniyor';
      else if(st==='CHANNEL_ERROR'||st==='TIMED_OUT') $('state').textContent='bağlantı sorunu · sayfayı yenile';
    });
  }catch(e){ $('state').textContent='bağlantı hatası'; }
}
</script>
</body>
</html>
