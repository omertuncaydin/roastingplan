<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="robots" content="noindex,nofollow">
<title>Crack Screen · CoffeeNutz</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<style>
:root{--bg:#191512;--panel:#221c15;--line:#3a3128;--ink:#f3ede4;--muted:#a8998a;--dim:#8a7a68;--gold:#e6c14b;--warn:#e24b4a;--drop:#e07a6a}
html,body{margin:0;height:100%}
body{background:var(--bg);color:var(--ink);font-family:-apple-system,'Helvetica Neue',Helvetica,Arial,sans-serif;display:flex;align-items:center;justify-content:center;transition:background .4s}
body.a0pre #a0strip,body.tpre #a0strip,body.tnow #a0strip{display:block}
body.a0now{background:#3d2b10}
body.tpre #a0strip{border-color:var(--warn);color:var(--warn)}
body.tnow #a0strip{background:var(--warn);border-color:var(--warn);color:#fff;animation:pulse 1.1s ease-out infinite}
body.tnow #btnD{background:var(--warn);color:#fff;border-color:var(--warn);animation:pulse 1.1s ease-out infinite}
.card{text-align:center;padding:12px 14px;max-width:300px;width:100%;position:relative}
#lng{position:absolute;top:2px;right:10px;background:none;border:1px solid var(--line);color:var(--dim);border-radius:999px;padding:2px 10px;font-size:11px;font-weight:600;cursor:pointer}
#coffee{font-size:12px;color:var(--muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
#note{font-size:11px;color:var(--gold);margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;display:none}
#a0strip{display:none;background:none;border:1px solid var(--gold);color:var(--gold);border-radius:12px;padding:5px 8px;font-size:12.5px;font-weight:700;margin:6px 0 0}
body.a0now #a0strip{display:block;background:var(--gold);color:#1a1410;animation:pulse 1.1s ease-out infinite}
@keyframes pulse{0%{opacity:1}50%{opacity:.65}100%{opacity:1}}
#gwrap{position:relative;width:170px;height:100px;margin:4px auto 0}
#garc{transition:stroke-dashoffset 1.1s linear}
#proj{position:absolute;top:46px;left:0;right:0;font-size:23px;font-weight:800;line-height:1;letter-spacing:.5px}
#projLbl{position:absolute;top:72px;left:0;right:0;font-size:9px;color:#8a7a68;letter-spacing:1px}
#btnD.armed small,body.tnow #btnD small{color:#fff}
#meta{font-size:12.5px;color:var(--muted);margin-top:-2px}
#meta b{color:var(--gold)}
#meta2{font-size:11.5px;color:var(--dim);margin-top:2px}
#btns{display:flex;gap:8px;margin-top:12px}
#btnS{flex:1.6;background:var(--gold);color:#1a1410;border:none;border-radius:14px;padding:11px 0;font-size:13.5px;font-weight:800;cursor:pointer}
body.a0now #btnS{animation:pulse 1.1s ease-out infinite}
#btnD{flex:1;background:#2a1512;color:var(--drop);border:1px solid #5a2b22;border-radius:14px;padding:8px 0 6px;font-size:13px;font-weight:700;cursor:pointer}
#btnD small{display:block;font-size:9px;font-weight:500;color:#a06055}
#btnD.armed{background:var(--warn);color:#fff}
#btns2{display:none;gap:8px;margin-top:12px}
#btnAgain{flex:1.3;background:var(--gold);color:#1a1410;border:none;border-radius:14px;padding:11px 0;font-size:12px;font-weight:800;cursor:pointer}
#btnFresh{flex:1;background:#2a241c;color:var(--gold);border:1px solid var(--line);border-radius:14px;padding:11px 0;font-size:12px;font-weight:700;cursor:pointer}
button:disabled{opacity:.35}
#state{font-size:12px;color:var(--dim);margin-top:10px}
body.stale .fade{opacity:.35}
/* ---- tablet second-screen scale ---- */
.card{max-width:780px;padding:28px 30px}
#lng{font-size:15px;padding:5px 16px;top:6px;right:16px}
#coffee{font-size:26px}
#note{font-size:19px;margin-top:6px}
#a0strip{font-size:24px;padding:14px 16px;border-radius:18px;margin-top:12px}
#gwrap{transform:scale(2.35);transform-origin:top center;margin:26px auto 158px}
#meta{font-size:24px;margin-top:0}
#meta2{font-size:19px;margin-top:6px}
#btns{gap:16px;margin-top:26px}
#btnS{font-size:28px;padding:26px 0;border-radius:22px}
#btnD{font-size:26px;padding:20px 0 16px;border-radius:22px}
#btnD small{font-size:14px}
#btns2{gap:16px;margin-top:26px}
#btnAgain,#btnFresh{font-size:22px;padding:26px 0;border-radius:22px}
#state{font-size:18px;margin-top:22px}
#fsBtn{position:fixed;top:10px;left:10px;background:none;border:1px solid var(--line);color:var(--dim);border-radius:999px;padding:6px 16px;font-size:14px;font-weight:600;cursor:pointer}
</style>
</head>
<body>
<button id="fsBtn" onclick="fsTog()">⛶</button>
<div class="card">
  <button id="lng" onclick="langTog()">TR</button>
  <div class="fade" id="coffee">·</div>
  <div id="note"></div>
  <div id="a0strip" onclick="stripTap()">·</div>
  <div class="fade" id="gwrap">
    <svg viewBox="0 0 170 100" width="170" aria-hidden="true">
      <path d="M17 88 A68 68 0 0 1 153 88" fill="none" stroke="#3a3128" stroke-width="10" stroke-linecap="round"/>
      <path id="garc" d="M17 88 A68 68 0 0 1 153 88" fill="none" stroke="#e6c14b" stroke-width="10" stroke-linecap="round" stroke-dasharray="213.6" stroke-dashoffset="213.6"/>
    </svg>
    <div id="proj">·</div>
    <div id="projLbl">AGTRON · FORECAST</div>
  </div>
  <div class="fade" id="meta"></div>
  <div class="fade" id="meta2"></div>
  <div id="btns">
    <button id="btnS" onclick="sendSample()">SAMPLE</button>
    <button id="btnD" onclick="tapDrop()">DROP<small id="dHint">tap 2x</small></button>
  </div>
  <div id="btns2">
    <button id="btnAgain" onclick="sendAgain()">ROAST THIS COFFEE</button>
    <button id="btnFresh" onclick="sendFresh()">ROAST NEW COFFEE</button>
  </div>
  <div id="state">connecting…</div>
</div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script>
const $=id=>document.getElementById(id);
function fsTog(){ try{ if(document.fullscreenElement){ document.exitFullscreen(); } else if(document.documentElement.requestFullscreen){ document.documentElement.requestFullscreen(); } else { alert((localStorage.getItem('cwLang')||'en')==='tr'?'Tam ekran için: Paylaş > Ana Ekrana Ekle':'For full screen: Share > Add to Home Screen'); } }catch(e){} }
const SU='https://efjvfggwnhqkunjvoyjb.supabase.co';
const AK='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVmanZmZ2d3bmhxa3VuanZveWpiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIzMTA5MDEsImV4cCI6MjA5Nzg4NjkwMX0.A42X5lr8bYarJZVjPmfb45oyVnWYREODF4a6Y7i_tDA';
const KEY=new URLSearchParams(location.search).get('k');
const ARC=213.6;
let LANG=localStorage.getItem('cwLang')||'en';
const T={
 en:{live:'live', hbst:'recording · waiting for projection', fin:'drop · roast ended', finw:'roast ended · waiting for the next roast…', stale:'waiting for signal…', conn:'connected · waiting for a roast', nokey:'link missing: Listener > tuning > Watch cast', nolib:'connection library failed to load', cerr:'connection problem · refresh', lock:'remote control · Roaster plan', ssent:'sample sent ✓', dsent:'drop sent ✓', asent:'start sent ✓', fsent:'new coffee · name it on the phone', sure:'sure? tap again', tap2:'tap 2x', cracks:'cracks', lbl:'AGTRON · FORECAST', bS:'SAMPLE', bD:'DROP', bA:'ROAST THIS COFFEE', bF:'ROAST NEW COFFEE', a0p:'A0 near · get ready to pull', a0n:'A0 STARTED · PULL THE SAMPLE NOW', tp:"target color approaching · get ready to drop", tn:'TARGET COLOR · DROP NOW', cue:x=>'Enter A0 with '+x},
 tr:{live:'canlı', hbst:'kayıt sürüyor · projeksiyon bekliyor', fin:'drop · kayıt bitti', finw:'kayıt bitti · yeni kavurma bekleniyor…', stale:'sinyal bekleniyor…', conn:'bağlı · kavurma bekleniyor', nokey:'link eksik: Listener > ayar & iz > Watch yayını', nolib:'bağlantı kitaplığı yüklenemedi', cerr:'bağlantı sorunu · sayfayı yenile', lock:'uzaktan kontrol · Roaster planı', ssent:'numune gönderildi ✓', dsent:'drop gönderildi ✓', asent:'başlat gönderildi ✓', fsent:'yeni kahve · telefonda isim seç', sure:'emin misin? tekrar', tap2:'2x dokun', cracks:'çatlak', lbl:'AGTRON · ÖNGÖRÜ', bS:'NUMUNE', bD:'DROP', bA:'BU KAHVEYİ KAVUR', bF:'YENİ KAHVE KAVUR', a0p:'A0 yakın · numuneye hazırlan', a0n:'A0 BAŞLADI · NUMUNEYİ ŞİMDİ ÇEK', tp:"hedef renk yaklaşıyor · drop'a hazırlan", tn:'HEDEF RENK · DROP ZAMANI', cue:x=>"A0'a "+x+" ile gir"}
};
const L=k=>T[LANG][k];
function applyLang(){
  $('lng').textContent=LANG==='en'?'TR':'EN';
  $('projLbl').textContent=L('lbl');
  $('btnS').textContent=L('bS');
  $('btnD').innerHTML=L('bD')+'<small id="dHint">'+L('tap2')+'</small>';
  $('btnAgain').textContent=L('bA');
  $('btnFresh').textContent=L('bF');
  document.documentElement.lang=LANG;
}
function langTog(){ LANG=LANG==='en'?'tr':'en'; localStorage.setItem('cwLang',LANG); applyLang(); if(LASTP) render(LASTP); }
let LASTMSG=0, FIN=false, LIVE=false, DROPARM=0, LASTT=-1, CTL=1, LASTP=null;
function cmd(a){ return fetch(SU+'/realtime/v1/api/broadcast',{method:'POST',headers:{apikey:AK,authorization:'Bearer '+AK,'content-type':'application/json'},
  body:JSON.stringify({messages:[{topic:'cnw-'+KEY, event:'cmd', payload:{a}, private:false}]})}); }
function sT(id,v){ const el=$(id); if(el&&el.textContent!==v) el.textContent=v; }
function sH(id,v){ const el=$(id); if(el&&el.innerHTML!==v) el.innerHTML=v; }
function render(p){
  LASTP=p;
  LASTMSG=Date.now(); document.body.classList.remove('stale');
  if((FIN&&!p.fin)||(typeof p.t==='number'&&p.t+5<LASTT)){
    $('proj').textContent='·'; $('garc').style.strokeDashoffset=ARC;
    document.body.classList.remove('a0pre','a0now','tpre','tnow'); DROPARM=0;
    $('btnD').classList.remove('armed'); const dh=$('dHint'); if(dh) dh.textContent=L('tap2'); }
  if(typeof p.t==='number') LASTT=p.t;
  if('ctl' in p) CTL=p.ctl?1:0;
  ['btnS','btnD','btnAgain','btnFresh'].forEach(id=>{ const b=$(id); if(b) b.style.opacity=CTL?'':'0.45'; });
  FIN=!!p.fin; LIVE=!FIN;
  if(FIN) document.body.classList.remove('a0pre','a0now','tpre','tnow');
  $('btns').style.display=FIN?'none':'flex';
  $('btns2').style.display=FIN?'flex':'none';
  sT('coffee',p.c||'?');
  if(p.proj!=null) sT('proj',(p.band!=null)?(Math.round(p.proj-p.band)+'-'+Math.round(p.proj+p.band)):('~'+Math.round(p.proj)));
  else if($('proj').textContent==='') sT('proj','·');
  const showNote=p.nt&&!FIN&&!p.st;   // the cue retires the moment the storm names its first stage
  if(showNote){ sT('note',(p.nt.indexOf(' ')>=0?p.nt:T[LANG].cue(p.nt))); if($('note').style.display!=='block') $('note').style.display='block'; }
  else if($('note').style.display!=='none') $('note').style.display='none';
  sH('meta','<b>'+(p.st||'·')+'</b> · '+fmtT(p.t||0));
  sT('meta2',(p.n||0)+' '+L('cracks'));
  if(FIN) $('garc').style.strokeDashoffset=0;
  else if(typeof p.p==='number') $('garc').style.strokeDashoffset=ARC*(1-Math.min(1,p.p));
  document.body.classList.toggle('a0pre',p.w===1);
  document.body.classList.toggle('a0now',p.w===2);
  if('g' in p){ document.body.classList.toggle('tpre',p.g===1); document.body.classList.toggle('tnow',p.g===2); }
  let sv=null;
  if(p.w===2) sv=L('a0n'); else if(p.w===1) sv=L('a0p'); else if(p.g===2) sv=L('tn'); else if(p.g===1) sv=L('tp');
  if(sv!=null) sT('a0strip',sv);
  sT('state',FIN?L('fin'):(p.hb?L('hbst'):L('live')));
}
window.render=render;
function fmtT(t){ return Math.floor(t/60)+':'+('0'+Math.floor(t%60)).slice(-2); }
function fresh(){ return LIVE&&Date.now()-LASTMSG<=5000; }
function ctlOk(){ if(CTL===0){ flash(L('lock')); return false; } return true; }
function stripTap(){ const b=document.body.classList;
  if(b.contains('a0now')||b.contains('a0pre')) sendSample();
  else if(b.contains('tnow')||b.contains('tpre')) tapDrop(); }
function sendSample(){ if(!fresh()||!ctlOk()) return;
  try{ cmd('sample').catch(()=>{}); flash(L('ssent')); }catch(e){} }
function tapDrop(){ if(!fresh()||!ctlOk()) return;
  const now=Date.now();
  if(now-DROPARM>2500){ DROPARM=now; $('btnD').classList.add('armed'); $('dHint').textContent=L('sure');
    setTimeout(()=>{ if(Date.now()-DROPARM>=2400){ $('btnD').classList.remove('armed'); const dh=$('dHint'); if(dh) dh.textContent=L('tap2'); } },2600); return; }
  DROPARM=0; $('btnD').classList.remove('armed'); $('dHint').textContent=L('tap2');
  try{ cmd('drop').catch(()=>{}); flash(L('dsent')); }catch(e){} }
function sendAgain(){ if(!FIN||!ctlOk()) return; try{ cmd('again').catch(()=>{}); flash(L('asent')); }catch(e){} }
function sendFresh(){ if(!FIN||!ctlOk()) return; try{ cmd('fresh').catch(()=>{}); flash(L('fsent')); }catch(e){} }
function flash(msg){ $('state').textContent=msg; document.body.style.outline='3px solid var(--gold)';
  setTimeout(()=>{ document.body.style.outline='none'; },600); }
setInterval(()=>{ if(!LASTP||FIN||!LIVE||typeof LASTP.t!=='number') return;
  const gap=Date.now()-LASTMSG; if(gap<600||gap>6000) return;
  sH('meta','<b>'+(LASTP.st||'\u00b7')+'</b> \u00b7 '+fmtT(LASTP.t+gap/1000)); },1000);   // local tick between casts
setInterval(()=>{ if(!LASTMSG) return;
  const gap=Date.now()-LASTMSG;
  if(!FIN&&gap>10000){ document.body.classList.add('stale'); LIVE=false;
    $('btnS').disabled=$('btnD').disabled=true; $('state').textContent=L('stale'); }
  else if(FIN&&gap>30000){ document.body.classList.add('stale'); $('state').textContent=L('finw'); } },2000);
applyLang();
if(!KEY){ $('state').textContent=L('nokey'); }
else if(typeof supabase==='undefined'){ $('state').textContent=L('nolib'); }
else{
  try{
    const sb=supabase.createClient(SU,AK);
    sb.channel('cnw-'+KEY).on('broadcast',{event:'live'},m=>render(m.payload||{})).subscribe(st=>{
      if(st==='SUBSCRIBED') $('state').textContent=L('conn');
      else if(st==='CHANNEL_ERROR'||st==='TIMED_OUT') $('state').textContent=L('cerr');
    });
  }catch(e){ $('state').textContent='connection error'; }
}
</script>
</body>
</html>
