<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Input test</title>
<style>
:root{--bg:#1a1410;--panel:#241c16;--panel2:#201a15;--ink:#f3ede4;--line:#3a2f26}
.wrap{max-width:460px;margin:0 auto;display:flex;flex-direction:column}
.wrap>*{order:10}
.card{background:var(--panel);border-radius:12px;padding:14px;margin-bottom:12px}
body.st-setup .card{order:1}
</style>
</head>
<body style="margin:0;background:#1a1410;color:#f3ede4;font-family:-apple-system,sans-serif;padding:16px">
<div class="wrap">
<h2 style="font-size:17px">Standalone input test</h2>
<p id="env" style="font-size:13px;color:#a8998a"></p>
<p style="font-size:13px">1 · bare input, no styling:</p>
<input type="text" placeholder="type here 1">
<p style="font-size:13px">2 · app-styled input:</p>
<input type="text" placeholder="type here 2" style="width:100%;border:1px solid var(--line);border-radius:9px;padding:10px;font-size:16px;background:var(--panel2);color:var(--ink)">
<div class="card">
<p style="font-size:13px;margin-top:0">3 · inside a card, app structure:</p>
<input type="text" placeholder="type here 3" style="width:100%;border:1px solid var(--line);border-radius:9px;padding:10px;font-size:16px;background:var(--panel2);color:var(--ink)">
</div>
<p style="font-size:13px">4 · after body class set by script (like the app):</p>
<input type="text" placeholder="type here 4" style="width:100%;border:1px solid var(--line);border-radius:9px;padding:10px;font-size:16px;background:var(--panel2);color:var(--ink)">
</div>
<script>
document.body.className='st-setup';
document.getElementById('env').textContent='standalone: '+(navigator.standalone===true)+' · '+navigator.userAgent.slice(0,80);
</script>
</body>
</html>
