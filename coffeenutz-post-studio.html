<style>
:root{
  --paper:#E4DCCA; --ink:#1F2320; --amber:#BC7D15; --teal:#2E5D5A; --dark:#191C1A;
  --panel-bg:#141613; --panel-fg:#d9d3c5; --panel-dim:#8f897b; --panel-line:#2c2f2a;
  --serif-display:'Fraunces', Georgia, 'Times New Roman', serif;
  --serif-body:'Spectral', Georgia, serif;
  --mono:'IBM Plex Mono', 'Courier New', monospace;
}
*{box-sizing:border-box}
html,body{margin:0}
body{font-family:var(--serif-body);display:flex;background:#262824}
body.collapsed #panel{display:none}

/* ---------- PANEL ---------- */
#panel{width:372px;flex:0 0 372px;height:100vh;overflow-y:auto;background:var(--panel-bg);color:var(--panel-fg);font-family:var(--mono);font-size:12px;line-height:1.5}
#toolbar{position:sticky;top:0;z-index:5;background:#0f110e;border-bottom:1px solid var(--panel-line);padding:12px 14px;display:flex;flex-wrap:wrap;gap:7px}
#toolbar .brandline{flex-basis:100%;font-size:10px;letter-spacing:.16em;text-transform:uppercase;color:var(--amber);margin-bottom:3px}
.btn{font-family:var(--mono);font-size:10.5px;letter-spacing:.08em;text-transform:uppercase;background:#20241f;color:var(--panel-fg);border:1px solid var(--panel-line);padding:7px 9px;border-radius:3px;cursor:pointer}
.btn:hover{border-color:var(--amber);color:#fff}
.btn.primary{background:var(--amber);color:#1a1400;border-color:var(--amber);font-weight:500}
.btn.primary:hover{background:#d38e1c}
.mode-tabs{display:flex;gap:0;border-bottom:1px solid var(--panel-line)}
.mode-tab{flex:1;text-align:center;padding:11px 6px;cursor:pointer;font-size:10.5px;letter-spacing:.13em;text-transform:uppercase;color:var(--panel-dim);border-bottom:2px solid transparent;user-select:none}
.mode-tab.active{color:var(--amber);border-bottom-color:var(--amber)}
.panel-hint{padding:11px 15px;color:var(--panel-dim);font-size:10.5px;line-height:1.6;border-bottom:1px solid var(--panel-line)}
details.sec{border-bottom:1px solid var(--panel-line)}
details.sec>summary{cursor:pointer;padding:11px 15px;list-style:none;font-size:11px;letter-spacing:.13em;text-transform:uppercase;color:#efe9db;user-select:none}
details.sec>summary::-webkit-details-marker{display:none}
details.sec>summary::before{content:"+";color:var(--amber);font-weight:600;width:14px;display:inline-block}
details.sec[open]>summary::before{content:"\2013"}
.fieldwrap{padding:4px 15px 14px}
.f-label{display:block;margin:11px 0 4px;font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--panel-dim)}
input.f,textarea.f,select.f{width:100%;background:#1d211c;border:1px solid var(--panel-line);color:#efe9db;font-family:var(--serif-body);font-size:13px;padding:7px 8px;border-radius:3px;line-height:1.45}
select.f{font-family:var(--mono);font-size:12px}
input.f:focus,textarea.f:focus,select.f:focus{outline:none;border-color:var(--amber)}
textarea.f{resize:vertical;min-height:52px}
.li{border:1px solid var(--panel-line);border-radius:4px;padding:9px;margin:9px 0;background:#181b16}
.li .li-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:5px;gap:6px}
.li .li-idx{font-size:10px;letter-spacing:.12em;color:var(--amber);text-transform:uppercase;flex:1}
.li-mini{background:none;border:1px solid var(--panel-line);color:var(--panel-dim);cursor:pointer;font-family:var(--mono);font-size:11px;line-height:1;padding:3px 7px;border-radius:3px}
.li-mini:hover{color:#fff;border-color:var(--amber)}
.li-del:hover{color:#e0705a !important}
.addbtn{width:100%;margin-top:6px;background:#181b16;border:1px dashed var(--panel-line);color:var(--panel-dim);padding:8px;border-radius:4px;cursor:pointer;font-family:var(--mono);font-size:10.5px;letter-spacing:.09em;text-transform:uppercase}
.addbtn:hover{border-color:var(--amber);color:var(--amber)}
input[type=file]{display:none}
.img-row{display:flex;gap:6px;align-items:center;margin-top:5px}
#reopen{position:fixed;top:14px;left:14px;z-index:50;display:none}
body.collapsed #reopen{display:block}

/* ---------- STAGE ---------- */
#stage{flex:1;height:100vh;overflow:auto;padding:30px 20px 80px;display:flex;flex-direction:column;align-items:center;gap:34px}
.board-wrap{display:flex;flex-direction:column;gap:8px;align-items:flex-start}
.board-cap{display:flex;justify-content:space-between;width:100%;align-items:center;font-family:var(--mono);font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:#8f897b}
.board-cap .dl{cursor:pointer;color:var(--amber);background:none;border:1px solid var(--panel-line);padding:4px 9px;border-radius:3px;font-family:var(--mono);font-size:10px;letter-spacing:.1em;text-transform:uppercase}
.board-cap .dl:hover{border-color:var(--amber)}
.scalebox{box-shadow:0 10px 40px rgba(0,0,0,.45)}

/* ---------- CARD DESIGN (rendered at native px, scaled for screen) ---------- */
.card{position:relative;overflow:hidden;background:var(--paper);color:var(--ink);font-family:var(--serif-body)}
.card.dark{background:var(--dark);color:var(--paper)}
.card .pad{position:absolute;inset:0;display:flex;flex-direction:column}
.card .k-top{display:flex;justify-content:space-between;align-items:flex-start;font-family:var(--mono);text-transform:uppercase}
.card .k-top .kk{letter-spacing:.24em}
.card .k-top .kr{letter-spacing:.18em;color:var(--amber);text-align:right;white-space:pre-line}
.card .wavebox{color:var(--amber)}
.card .wavebox svg{display:block;width:100%;height:100%}
.card h1{font-family:var(--serif-display);font-weight:500;letter-spacing:-.01em;line-height:1.02;margin:0}
.card .sub{font-family:var(--serif-body);font-style:italic;line-height:1.42;margin:0}
.card .bodycopy{font-family:var(--serif-body);line-height:1.55;margin:0;white-space:pre-line}
.card .quoteline{font-family:var(--serif-display);font-style:italic;line-height:1.3;border-top:3px solid var(--amber);border-bottom:3px solid var(--amber);margin:0}
.card .foot{margin-top:auto;display:flex;justify-content:space-between;align-items:flex-end;font-family:var(--mono);text-transform:uppercase}
.card .foot .fl{letter-spacing:.18em}
.card .foot .fr{letter-spacing:.18em;color:var(--amber)}
.card .imgbox{overflow:hidden;background:#d6cdb8;border:2px solid rgba(31,35,32,.25)}
.card.dark .imgbox{border-color:rgba(228,220,202,.3)}
.card .imgbox img{width:100%;height:100%;object-fit:cover;display:block}
.card .pricegrid{font-family:var(--mono);border-top:2px solid var(--amber);border-bottom:2px solid var(--amber)}
.card .pricegrid .pg-row{display:flex;justify-content:space-between;align-items:baseline}
.card .pricegrid .pg-l{letter-spacing:.14em;text-transform:uppercase;opacity:.75}
.card .pricegrid .pg-r{font-family:var(--serif-display);font-weight:500}
.card .metaline{font-family:var(--mono);letter-spacing:.1em;text-transform:uppercase;white-space:pre-line;line-height:1.9}
.card .metaline .mhl{color:var(--amber)}
.card .cta{font-family:var(--mono);letter-spacing:.14em;text-transform:uppercase;background:var(--amber);color:#1a1400;align-self:flex-start;font-weight:500}
</style>
</head>
<body>
<button id="reopen" class="btn" onclick="document.body.classList.remove('collapsed')">Editor</button>

<aside id="panel">
  <div id="toolbar">
    <div class="brandline">CoffeeNutz Feed Studio <span style="opacity:.55">v2026-07-13j</span></div>
    <button class="btn primary" onclick="downloadAll()">Download PNGs</button>
    <button class="btn" onclick="doSave()">Save JSON</button>
    <button class="btn" onclick="document.getElementById('jsonFile').click()">Load</button>
    <button class="btn" onclick="document.body.classList.add('collapsed')">Hide</button>
    <button class="btn" onclick="var u=new window.URL(location.href);u.searchParams.set('v',Date.now());location.href=u.href" title="Reload the app fresh">Refresh</button><!-- cn-refresh -->
    <input type="file" id="jsonFile" accept="application/json">
    <input type="file" id="imgFile" accept="image/*">
  </div>
  <div class="mode-tabs">
    <div class="mode-tab" data-mode="carousel" onclick="setMode('carousel')">IG Carousel</div>
    <div class="mode-tab" data-mode="announce" onclick="setMode('announce')">Announcement</div>
    <div class="mode-tab" data-mode="shopbanner" onclick="setMode('shopbanner')">Shopify Banner</div>
  </div>
  <div class="panel-hint" id="hint"></div>
  <div id="sections"></div>
</aside>

<main id="stage"></main>

<script>
/* =============== defaults (CoffeeNutz voice, Turkish audience copy, no em dashes) =============== */
const SAMPLE = {
  mode:"announce",
  brand:{ handle:"@coffeenutznet", site:"coffeenutz.net", wordmark:"CoffeeNutz" },
  carousel:{
    theme:"light", kicker:"KAVURMA DEFTERİ", series:"No. 01",
    slides:[
      {type:"cover", title:"Kavurma sırasında tanenin sesini nasıl okuruz?", sub:"İlk çatlak bir an değil, bir ritimdir. Kaydırın.", body:"", img:"", tag:""},
      {type:"teach", title:"Prob sıcaklığı taneyi ölçmez", sub:"", body:"Tanenin içini değil, tamburun havasını okursunuz. Prob, çevre sıcaklığına tanelerin değdiği kadarıyla yaklaşır.\n\nSıcaklık bağlamdır. Kaynak değil.", img:"", tag:"01"},
      {type:"teach", title:"Ses doğrudan taneden gelir", sub:"", body:"Çatlak sesi tanenin faz geçişinin kendisidir. Aradaki boşluklar, sıklık ve şiddet size gelişimin gerçek durumunu söyler.", img:"", tag:"02"},
      {type:"quote", title:"", sub:"", body:"Çatlakların arasındaki boşluk, bilginin yaşadığı yerdir.", img:"", tag:"03"},
      {type:"close", title:"Devamı sınıfta", sub:"SCA Roasting eğitimlerinde bunu birlikte dinliyoruz.", body:"", img:"", tag:""}
    ]
  },
  announce:{
    theme:"dark", kicker:"SCA SERTİFİKALI EĞİTİM",
    title:"Q Grader Sertifikasyon",
    dateline:"24-29 Ağustos 2026", city:"İzmir, CoffeeNutz HQ",
    seats:"Kontenjan: 6 kişi", lang:"Eğitim dili: Türkçe",
    highlight:"Cupper lisansı: 36 ay dahil",
    price:"110.000 ₺", installment:"6 ay taksit imkânı: 6 x 18.333,33 ₺ (kredi kartı, ek ücret yok)",
    cta:"Kayıtlar başladı", extra:"Sertifika, öğünler ve KDV dahil.",
    img:"",
    outputs:{ igfeed:true, igstory:true, linkedin:true, banner:true, siteban:true, ytthumb:false, ytcover:false, og:false, email:false }
  },
  shopbanner:{ banners:[
    { img:"", bgimg:false, alt:"SCA Roasting Bundle sınıf afişi",
      heading:"SCA Roasting Bundle",
      subheading:"04-07 Ağustos 2026 · İzmir, CoffeeNutz HQ · Roasting App lisansı 12 ay dahil",
      button:"Kayıtlar başladı" },
    { img:"", bgimg:false, alt:"Q Grader Sertifikasyon sınıf afişi",
      heading:"Q Grader Sertifikasyon",
      subheading:"24-29 Ağustos 2026 · İzmir, CoffeeNutz HQ · Cupper lisansı 36 ay dahil",
      button:"Kayıtlar başladı" }
  ]}
};
const clone = o => JSON.parse(JSON.stringify(o));
let state = clone(SAMPLE);

/* =============== helpers =============== */
function wave(amp,cycles){
  let d="M0 "+(amp)+" ";
  const W=1000, step=W/(cycles*2);
  for(let i=0;i<cycles*2;i++){
    const x1=i*step+step/2, y=(i%2===0)?0:amp*2, x2=(i+1)*step;
    d+="Q "+x1+" "+y+" "+x2+" "+amp+" ";
  }
  return '<svg viewBox="0 0 1000 '+(amp*2)+'" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg"><path d="'+d+'" fill="none" stroke="currentColor" stroke-width="4"/></svg>';
}
function esc(s){return (s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;")}
/* Turkish-correct uppercasing (i -> İ, ı -> I); CSS text-transform gets English casing wrong */
function trUp(s){return (s||"").toLocaleUpperCase('tr-TR')}

/* =============== card renderers (native px) =============== */
function slideCard(sl, idx, total, th){
  const dark = th==="dark";
  const W=1080,H=1350,P=92;
  let mid="";
  if(sl.type==="cover"){
    mid = '<div style="margin:auto 0">'
        + '<div class="wavebox" style="height:110px;margin:0 0 44px;width:62%">'+wave(20,7)+'</div>'
        + '<h1 style="font-size:92px">'+esc(sl.title)+'</h1>'
        + (sl.sub?'<p class="sub" style="font-size:36px;margin-top:36px;opacity:.92">'+esc(sl.sub)+'</p>':"")
        + '</div>';
  } else if(sl.type==="quote"){
    mid = '<div style="margin:auto 0"><p class="quoteline" style="font-size:64px;padding:56px 0">'+esc(sl.body)+'</p></div>';
  } else if(sl.type==="close"){
    mid = '<div style="margin:auto 0">'
        + '<h1 style="font-size:80px">'+esc(sl.title)+'</h1>'
        + (sl.sub?'<p class="sub" style="font-size:34px;margin-top:32px;opacity:.92">'+esc(sl.sub)+'</p>':"")
        + '<div class="wavebox" style="height:80px;margin:52px 0 0;width:44%">'+wave(20,5)+'</div>'
        + '</div>';
  } else { /* teach */
    mid = '<div style="margin-top:100px">'
        + '<h1 style="font-size:64px;max-width:860px">'+esc(sl.title)+'</h1>'
        + '<div class="wavebox" style="height:34px;margin:40px 0;width:30%">'+wave(14,4)+'</div>'
        + (sl.img?'<div class="imgbox" style="height:420px;margin:0 0 40px"><img src="'+sl.img+'"></div>':"")
        + '<p class="bodycopy" style="font-size:33px;max-width:860px">'+esc(sl.body)+'</p>'
        + '</div>';
  }
  return card(W,H,dark,
    '<div class="k-top" style="font-size:24px"><span class="kk">'+esc(trUp(state.carousel.kicker))+'</span><span class="kr">'+(sl.tag?esc(trUp(sl.tag)):esc(trUp(state.carousel.series)))+'</span></div>'
    + mid
    + '<div class="foot" style="font-size:23px"><span class="fl">'+esc(state.brand.handle)+'</span><span class="fr">'+String(idx+1).padStart(2,"0")+" / "+String(total).padStart(2,"0")+'</span></div>',
    P);
}

function announceCard(kind){
  const a=state.announce, dark=a.theme==="dark";
  const dims={igfeed:[1080,1350], igstory:[1080,1920], linkedin:[1200,627], banner:[1920,820], siteban:[1200,600], ytthumb:[1280,720], ytcover:[2560,1440], og:[1200,630], email:[1200,400]}[kind];
  const W=dims[0],H=dims[1];
  const s=W/1080; /* type scale relative to 1080 width */
  const meta = esc(trUp(a.dateline))+"\n"+esc(trUp(a.city))+"\n"+esc(trUp(a.seats))+"\n"+esc(trUp(a.lang))
    + (a.highlight?'\n<span class="mhl">'+esc(trUp(a.highlight))+'</span>':"");
  const priceBlock =
    '<div class="pricegrid" style="padding:'+(26*s)+'px 0;margin:'+(40*s)+'px 0 0">'
    + '<div class="pg-row"><span class="pg-l" style="font-size:'+(22*s)+'px">'+trUp('Eğitim Bedeli')+'</span><span class="pg-r" style="font-size:'+(52*s)+'px">'+esc(a.price)+'</span></div>'
    + '<div style="font-family:var(--mono);font-size:'+(21*s)+'px;letter-spacing:.06em;margin-top:'+(12*s)+'px;opacity:.85">'+esc(a.installment)+'</div>'
    + '</div>';
  const cta='<div class="cta" style="font-size:'+(24*s)+'px;padding:'+(16*s)+'px '+(28*s)+'px;margin-top:'+(44*s)+'px">'+esc(trUp(a.cta))+' &#8594; '+esc(trUp(state.brand.site))+'</div>';

  if(kind==="igstory"){
    return card(W,H,dark,
      '<div class="k-top" style="font-size:26px"><span class="kk">'+esc(trUp(a.kicker))+'</span><span class="kr">'+esc(trUp(state.brand.wordmark))+'</span></div>'
      + '<div style="margin:auto 0">'
      + '<h1 style="font-size:96px;max-width:880px">'+esc(a.title)+'</h1>'
      + '<div class="wavebox" style="height:60px;margin:56px 0;width:46%">'+wave(16,5)+'</div>'
      + '<div class="metaline" style="font-size:34px">'+meta+'</div>'
      + cta.replace('margin-top:'+(44)+'px','margin-top:64px')
      + '</div>'
      + '<div class="foot" style="font-size:24px"><span class="fl">'+esc(state.brand.handle)+'</span><span class="fr">'+trUp('Detay profildeki linkte')+'</span></div>', 100);
  }
  if(kind==="banner"||kind==="linkedin"||kind==="siteban"){
    const pad = kind==="banner"?70:(kind==="siteban"?56:64);
    const ctaX = (kind==="siteban"||kind==="banner") ? '<div class="cta" style="font-size:'+(kind==="banner"?26:20)+'px;padding:'+(kind==="banner"?'16px 28px':'14px 24px')+';margin-top:'+(kind==="banner"?34:30)+'px">'+esc(trUp(a.cta))+' &#8594; '+esc(trUp(state.brand.site))+'</div>' : cta;
    return card(W,H,dark,
      '<div style="display:flex;gap:'+(60*s)+'px;height:100%;align-items:center">'
      + '<div style="flex:1.35">'
      +   '<div class="k-top" style="font-size:'+(kind==="siteban"?19:(kind==="banner"?26:22*s))+'px"><span class="kk">'+esc(trUp(a.kicker))+'</span></div>'
      +   '<h1 style="font-size:'+(kind==="banner"?76:(kind==="siteban"?58:64*s))+'px;margin-top:'+(kind==="banner"?18:22*s)+'px">'+esc(a.title)+'</h1>'
      +   '<div class="metaline" style="font-size:'+(kind==="siteban"?20:(kind==="banner"?28:24*s))+'px;margin-top:'+(kind==="banner"?24:28*s)+'px">'+esc(trUp(a.dateline))+'  &#183;  '+esc(trUp(a.city))+'\n'+esc(trUp(a.seats))+'  &#183;  '+esc(trUp(a.lang))+(a.highlight?'\n<span class="mhl">'+esc(trUp(a.highlight))+'</span>':"")+'</div>'
      +   ctaX
      + '</div>'
      + '<div style="flex:1;align-self:stretch;display:flex;flex-direction:column;justify-content:center">'
      +   (a.img?'<div class="imgbox" style="height:'+(H-2*pad-20)+'px"><img src="'+a.img+'"></div>'
              :'<div class="wavebox" style="height:'+(H*0.42)+'px">'+wave(60,4)+'</div>')
      + '</div></div>', pad);
  }
  if(kind==="ytthumb"){
    return card(W,H,dark,
      '<div class="k-top" style="font-size:26px"><span class="kk">'+esc(trUp(a.kicker))+'</span><span class="kr">'+esc(trUp(state.brand.wordmark))+'</span></div>'
      + '<h1 style="font-size:132px;margin-top:56px;max-width:1020px">'+esc(a.title)+'</h1>'
      + '<div class="wavebox" style="height:46px;margin:44px 0 0;width:30%">'+wave(15,4)+'</div>'
      + (a.highlight?'<div class="metaline" style="font-size:40px;margin-top:46px"><span class="mhl">'+esc(trUp(a.highlight))+'</span></div>':"")
      , 70);
  }
  if(kind==="ytcover"){
    const sfL=(2560-1546)/2, sfT=(1440-423)/2;
    return card(W,H,dark,
      '<div style="position:relative;width:100%;height:100%">'
      + '<div class="noexport" style="position:absolute;left:'+sfL+'px;top:'+sfT+'px;width:1546px;height:423px;outline:3px dashed rgba(228,220,202,.45);pointer-events:none"></div>'
      + '<div class="noexport" style="position:absolute;left:'+sfL+'px;top:'+(sfT-44)+'px;font-family:var(--mono);font-size:22px;letter-spacing:.14em;opacity:.5">'+trUp('G\u00fcvenli alan 1546x423, \u00f6nizleme k\u0131lavuzu')+'</div>'
      + '<div class="wavebox" style="position:absolute;left:120px;top:520px;width:560px;height:400px">'+wave(60,4)+'</div>'
      + '<div class="wavebox" style="position:absolute;right:120px;top:520px;width:560px;height:400px">'+wave(60,4)+'</div>'
      + '<div style="position:absolute;left:'+sfL+'px;top:'+sfT+'px;width:1546px;height:423px;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center">'
      +   '<div class="metaline" style="font-size:26px">'+esc(trUp(a.kicker))+'</div>'
      +   '<h1 style="font-size:84px;margin:18px 0 22px">'+esc(a.title)+'</h1>'
      +   '<div class="metaline" style="font-size:30px;color:var(--amber)">'+esc(trUp(state.brand.site))+'</div>'
      + '</div></div>', 0);
  }
  if(kind==="og"){
    return card(W,H,dark,
      '<div style="height:100%;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center">'
      + '<div class="metaline" style="font-size:20px">'+esc(trUp(a.kicker))+'  &#183;  '+esc(trUp(state.brand.wordmark))+'</div>'
      + '<h1 style="font-size:88px;margin:30px 0 8px">'+esc(a.title)+'</h1>'
      + '<div class="wavebox" style="height:30px;margin:18px 0;width:28%">'+wave(15,3)+'</div>'
      + '<div class="metaline" style="font-size:23px;margin-top:12px">'+esc(trUp(a.dateline))+'  &#183;  '+esc(trUp(a.city))+'</div>'
      + (a.highlight?'<div class="metaline" style="font-size:24px;margin-top:14px"><span class="mhl">'+esc(trUp(a.highlight))+'</span></div>':"")
      + '</div>', 60);
  }
  if(kind==="email"){
    return card(W,H,dark,
      '<div style="height:100%;display:flex;align-items:center;justify-content:space-between;gap:48px">'
      + '<div>'
      +   '<div class="k-top" style="font-size:19px"><span class="kk">'+esc(trUp(a.kicker))+'</span></div>'
      +   '<h1 style="font-size:76px;margin-top:16px">'+esc(a.title)+'</h1>'
      +   '<div class="metaline" style="font-size:22px;margin-top:22px;color:var(--amber)">'+esc(trUp(state.brand.site))+'</div>'
      + '</div>'
      + '<div class="wavebox" style="width:360px;height:220px;flex:none">'+wave(60,4)+'</div>'
      + '</div>', 48);
  }
  /* igfeed */
  return card(W,H,dark,
    '<div class="k-top" style="font-size:24px"><span class="kk">'+esc(trUp(a.kicker))+'</span><span class="kr">'+esc(trUp(state.brand.wordmark))+'</span></div>'
    + '<div style="margin-top:90px">'
    + '<h1 style="font-size:88px;max-width:880px">'+esc(a.title)+'</h1>'
    + '<div class="wavebox" style="height:44px;margin:44px 0;width:38%">'+wave(15,5)+'</div>'
    + (a.img?'<div class="imgbox" style="height:340px;margin-bottom:44px"><img src="'+a.img+'"></div>':"")
    + '<div class="metaline" style="font-size:30px">'+meta+'</div>'
    + priceBlock
    + cta
    + '</div>'
    + '<div class="foot" style="font-size:23px"><span class="fl">'+esc(state.brand.handle)+'</span><span class="fr">'+esc(trUp(a.extra))+'</span></div>', 92);
}

function card(W,H,dark,inner,pad){
  return '<div class="card'+(dark?' dark':'')+'" lang="tr" style="width:'+W+'px;height:'+H+'px">'
       + '<div class="pad" style="padding:'+pad+'px">'+inner+'</div></div>';
}

/* =============== stage render =============== */
const PREVIEW_W = 470;
function boardWrap(html, label, W, H, dlName){
  const sc = PREVIEW_W/W;
  return '<div class="board-wrap">'
    + '<div class="board-cap" style="width:'+(W*sc)+'px"><span>'+label+' &#183; '+W+'&#215;'+H+'</span>'
    + '<button class="dl" onclick="exportBoard(\''+dlName+'\')">PNG</button></div>'
    + '<div class="scalebox" style="width:'+(W*sc)+'px;height:'+(H*sc)+'px">'
    + '<div data-board="'+dlName+'" style="transform:scale('+sc+');transform-origin:top left">'+html+'</div>'
    + '</div></div>';
}
function renderStage(){
  const st=document.getElementById('stage');
  if(state.mode==="carousel"){
    const th=state.carousel.theme, n=state.carousel.slides.length;
    st.innerHTML = state.carousel.slides.map((sl,i)=>
      boardWrap(slideCard(sl,i,n,th), 'Slide '+(i+1)+' ('+sl.type+')', 1080,1350, 'slide-'+(i+1))).join("");
  } else if(state.mode==="shopbanner"){
    st.innerHTML = state.shopbanner.banners.map((b,i)=>
      boardWrap(bannerRecCard(b), 'Banner '+(i+1), 1200,600, 'shopbanner-'+(i+1))).join("");
  } else {
    const o=state.announce.outputs; let h="";
    if(o.igfeed)  h+=boardWrap(announceCard('igfeed'),  'IG Feed', 1080,1350,'igfeed');
    if(o.igstory) h+=boardWrap(announceCard('igstory'), 'IG Story',1080,1920,'igstory');
    if(o.linkedin)h+=boardWrap(announceCard('linkedin'),'LinkedIn',1200,627,'linkedin');
    if(o.banner)  h+=boardWrap(announceCard('banner'),  'Wide Banner',1920,820,'banner');
    if(o.siteban) h+=boardWrap(announceCard('siteban'), 'Site Banner',1200,600,'siteban');
    if(o.ytthumb) h+=boardWrap(announceCard('ytthumb'), 'YT Thumbnail',1280,720,'ytthumb');
    if(o.ytcover) h+=boardWrap(announceCard('ytcover'), 'YT Channel Cover',2560,1440,'ytcover');
    if(o.og)      h+=boardWrap(announceCard('og'),      'OG Card',1200,630,'og');
    if(o.email)   h+=boardWrap(announceCard('email'),   'Email Header',1200,400,'email');
    st.innerHTML=h;
  }
}

/* =============== PNG export (html2canvas, lazy-loaded from cdnjs) =============== */
let H2C=null;
function loadH2C(){
  if(window.html2canvas) return Promise.resolve();
  if(H2C) return H2C;
  H2C=new Promise((res,rej)=>{
    const s=document.createElement('script');
    s.src='https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js';
    s.onload=res;
    s.onerror=()=>{ H2C=null; rej(new Error('offline')); };
    document.head.appendChild(s);
  });
  return H2C;
}
async function exportBoard(name, silent){
  const host=document.querySelector('[data-board="'+name+'"]');
  if(!host) return;
  try{ await loadH2C(); }
  catch(e){ if(!silent) alert('PNG export needs an internet connection (it fetches the capture library once).'); return; }
  if(document.fonts && document.fonts.ready){ try{ await document.fonts.ready; }catch(e){} }
  const cardEl=host.firstElementChild;
  const W=parseInt(cardEl.style.width), H=parseInt(cardEl.style.height);
  const holder=document.createElement('div');
  holder.style.cssText='position:fixed;left:-100000px;top:0;width:'+W+'px;height:'+H+'px;overflow:hidden';
  holder.innerHTML=cardEl.outerHTML;
  holder.querySelectorAll('.noexport').forEach(el=>el.remove());
  document.body.appendChild(holder);
  try{
    const cv=await html2canvas(holder.firstElementChild,{scale:1,width:W,height:H,backgroundColor:null,logging:false});
    await new Promise(res=>cv.toBlob(b=>{
      const a=document.createElement('a');
      a.href=URL.createObjectURL(b);
      a.download='coffeenutz-'+(state.mode==='carousel'?'carousel-':'')+name+'.png';
      a.click(); setTimeout(()=>URL.revokeObjectURL(a.href),1500); res();
    },'image/png'));
  }catch(e){ if(!silent) alert('Export failed: '+e.message); }
  holder.remove();
}
async function downloadAll(){
  const boards=[...document.querySelectorAll('[data-board]')].map(el=>el.dataset.board);
  for(const b of boards){ await exportBoard(b,true); await new Promise(r=>setTimeout(r,450)); }
}

/* =============== panel =============== */
const HINTS={
  carousel:"One layout, repeated. The swipe rhythm does the persuading. Cover hooks, teach slides give value, one quote breathes, close points home. Max 10 slides.",
  shopbanner:"Shopify banner records, 1200x600 preview. Five boxes per record, same as the theme section: image, alt text, heading, subheading, button label. Duplicate a record to make the next one.",
  announce:"One content set, nine surfaces. Date and city lead, cap is a room fact, installment lives in the copy, no scarcity words, no counts. YT cover is evergreen: type the motto as title, campaign text stays off it."
};
function setMode(m){ state.mode=m; renderPanel(); renderStage(); }
function field(label, path, type){
  const v=getPath(path);
  if(type==="textarea") return '<label class="f-label">'+label+'</label><textarea class="f" oninput="setPath(\''+path+'\',this.value)">'+esc(v)+'</textarea>';
  if(type&&type.startsWith("select:")){
    const opts=type.slice(7).split("|").map(o=>'<option'+(o===v?' selected':'')+'>'+o+'</option>').join("");
    return '<label class="f-label">'+label+'</label><select class="f" onchange="setPath(\''+path+'\',this.value)">'+opts+'</select>';
  }
  return '<label class="f-label">'+label+'</label><input class="f" value="'+esc(v).replace(/"/g,"&quot;")+'" oninput="setPath(\''+path+'\',this.value)">';
}
function getPath(p){ return p.split(".").reduce((o,k)=>o[k], state); }
function setPath(p,val){
  const ks=p.split("."), last=ks.pop();
  ks.reduce((o,k)=>o[k],state)[last]=val;
  renderStage();
}
function slideEditor(sl,i){
  return '<div class="li">'
    + '<div class="li-head"><span class="li-idx">Slide '+(i+1)+'</span>'
    + '<button class="li-mini" onclick="moveSlide('+i+',-1)">&#8593;</button>'
    + '<button class="li-mini" onclick="moveSlide('+i+',1)">&#8595;</button>'
    + '<button class="li-mini li-del" onclick="delSlide('+i+')">&#215;</button></div>'
    + field("Type","carousel.slides."+i+".type","select:cover|teach|quote|close")
    + field("Title","carousel.slides."+i+".title")
    + field("Subline","carousel.slides."+i+".sub")
    + field("Body","carousel.slides."+i+".body","textarea")
    + field("Corner tag","carousel.slides."+i+".tag")
    + '<div class="img-row"><button class="btn" onclick="pickImg(\'carousel.slides.'+i+'.img\')">Image</button>'
    + (sl.img?'<button class="btn" onclick="setPath(\'carousel.slides.'+i+'.img\',\'\');renderPanel()">Clear</button>':'')
    + '</div></div>';
}
function renderPanel(){
  document.querySelectorAll('.mode-tab').forEach(t=>t.classList.toggle('active',t.dataset.mode===state.mode));
  document.getElementById('hint').textContent=HINTS[state.mode];
  let h="";
  if(state.mode==="carousel"){
    h+='<details class="sec" open><summary>Series</summary><div class="fieldwrap">'
      + field("Kicker (top left)","carousel.kicker") + field("Series tag (top right)","carousel.series")
      + field("Theme","carousel.theme","select:light|dark")
      + field("Handle","brand.handle")
      + '</div></details>';
    h+='<details class="sec" open><summary>Slides ('+state.carousel.slides.length+'/10)</summary><div class="fieldwrap">'
      + state.carousel.slides.map(slideEditor).join("")
      + (state.carousel.slides.length<10?'<button class="addbtn" onclick="addSlide()">+ Add slide</button>':'')
      + '</div></details>';
  } else if(state.mode==="shopbanner"){
    h+='<details class="sec" open><summary>Banner pile ('+state.shopbanner.banners.length+')</summary><div class="fieldwrap">'
      + state.shopbanner.banners.map(bannerEditor).join("")
      + '<button class="addbtn" onclick="addBanner(true)">+ New from Announcement</button>'
      + '<button class="addbtn" onclick="addBanner(false)">+ New banner</button>'
      + '</div></details>';
  } else {
    h+='<details class="sec" open><summary>Content</summary><div class="fieldwrap">'
      + field("Kicker","announce.kicker") + field("Class title","announce.title")
      + field("Dates","announce.dateline") + field("City / venue","announce.city")
      + field("Seats line","announce.seats") + field("Language line","announce.lang")
      + field("Included line (gold, optional)","announce.highlight")
      + field("Price","announce.price") + field("Installment line","announce.installment","textarea")
      + field("CTA","announce.cta") + field("Footer note","announce.extra")
      + field("Theme","announce.theme","select:dark|light")
      + '<div class="img-row"><button class="btn" onclick="pickImg(\'announce.img\')">Photo</button>'
      + (state.announce.img?'<button class="btn" onclick="setPath(\'announce.img\',\'\');renderPanel()">Clear</button>':'')
      + '</div></div></details>';
    h+='<details class="sec" open><summary>Outputs</summary><div class="fieldwrap">'
      + ["igfeed","igstory","linkedin","banner","siteban","ytthumb","ytcover","og","email"].map(k=>
        '<label class="f-label" style="display:flex;gap:8px;align-items:center;text-transform:none">'
        + '<input type="checkbox" '+(state.announce.outputs[k]?'checked':'')+' onchange="state.announce.outputs.'+k+'=this.checked;renderStage()"> '
        + {igfeed:"IG Feed 1080x1350",igstory:"IG Story 1080x1920",linkedin:"LinkedIn 1200x627",banner:"Wide Banner 1920x820",siteban:"Site Banner 1200x600",ytthumb:"YT Thumbnail 1280x720",ytcover:"YT Channel Cover 2560x1440",og:"OG Card 1200x630",email:"Email Header 1200x400"}[k]+'</label>').join("")
      + '</div></details>';
  }
  document.getElementById('sections').innerHTML=h;
}
function addSlide(){ state.carousel.slides.push({type:"teach",title:"",sub:"",body:"",img:"",tag:""}); renderPanel(); renderStage(); }
function delSlide(i){ state.carousel.slides.splice(i,1); renderPanel(); renderStage(); }
function moveSlide(i,d){
  const s=state.carousel.slides, j=i+d;
  if(j<0||j>=s.length) return;
  [s[i],s[j]]=[s[j],s[i]]; renderPanel(); renderStage();
}
/* =============== shopify banner pile =============== */
function bannerRecCard(rec){
  if(rec.bgimg && rec.img){
    return card(1200,600,true,
      '<div style="position:absolute;inset:0"><img src="'+rec.img+'" alt="'+esc(rec.alt)+'" style="width:100%;height:100%;object-fit:cover;display:block"></div>'
      + '<div style="position:absolute;inset:0;background:linear-gradient(90deg,rgba(20,17,13,.85) 0%,rgba(20,17,13,.55) 46%,rgba(20,17,13,.05) 78%)"></div>'
      + '<div style="position:relative;display:flex;height:100%;align-items:center">'
      + '<div style="max-width:640px">'
      +   '<h1 style="font-size:60px;line-height:1.05">'+esc(rec.heading)+'</h1>'
      +   (rec.subheading?'<div class="metaline" style="font-size:20px;margin-top:22px">'+esc(trUp(rec.subheading))+'</div>':'')
      +   (rec.button?'<div class="cta" style="font-size:20px;padding:14px 26px;margin-top:32px">'+esc(trUp(rec.button))+'</div>':'')
      + '</div></div>', 56);
  }
  return card(1200,600,true,
    '<div style="display:flex;gap:48px;height:100%;align-items:center">'
    + '<div style="flex:1.2">'
    +   '<h1 style="font-size:60px;line-height:1.05">'+esc(rec.heading)+'</h1>'
    +   (rec.subheading?'<div class="metaline" style="font-size:20px;margin-top:22px">'+esc(trUp(rec.subheading))+'</div>':'')
    +   (rec.button?'<div class="cta" style="font-size:20px;padding:14px 26px;margin-top:32px">'+esc(trUp(rec.button))+'</div>':'')
    + '</div>'
    + '<div style="flex:1;align-self:stretch;display:flex;flex-direction:column;justify-content:center">'
    +   (rec.img?'<div class="imgbox" style="height:460px"><img src="'+rec.img+'" alt="'+esc(rec.alt)+'"></div>'
              :'<div class="wavebox" style="height:250px">'+wave(60,4)+'</div>')
    + '</div></div>', 56);
}
function addBanner(fromAnnounce){
  if(fromAnnounce){
    const a=state.announce;
    state.shopbanner.banners.push({ img:a.img||'', bgimg:false, alt:'',
      heading:a.title||'',
      subheading:[a.dateline,a.city,a.highlight].filter(Boolean).join(' · '),
      button:a.cta||'' });
  } else {
    state.shopbanner.banners.push({ img:'', bgimg:false, alt:'', heading:'', subheading:'', button:'' });
  }
  renderPanel(); renderStage();
}
function dupBanner(i){ state.shopbanner.banners.splice(i+1,0,clone(state.shopbanner.banners[i])); renderPanel(); renderStage(); }
function delBanner(i){ state.shopbanner.banners.splice(i,1); renderPanel(); renderStage(); }
function moveBanner(i,d){
  const s=state.shopbanner.banners, j=i+d;
  if(j<0||j>=s.length) return;
  [s[i],s[j]]=[s[j],s[i]]; renderPanel(); renderStage();
}
function bannerEditor(b,i){
  return '<div class="li">'
    + '<div class="li-head"><span class="li-idx">Banner '+(i+1)+'</span>'
    + '<button class="li-mini" title="duplicate" onclick="dupBanner('+i+')">&#10697;</button>'
    + '<button class="li-mini" onclick="moveBanner('+i+',-1)">&#8593;</button>'
    + '<button class="li-mini" onclick="moveBanner('+i+',1)">&#8595;</button>'
    + '<button class="li-mini li-del" onclick="delBanner('+i+')">&#215;</button></div>'
    + '<div class="img-row"><button class="btn" onclick="pickImg(\'shopbanner.banners.'+i+'.img\')">Image</button>'
    + (b.img?'<button class="btn" onclick="setPath(\'shopbanner.banners.'+i+'.img\',\'\');renderPanel()">Clear</button>':'')
    + '</div>'
    + '<label class="f-label" style="display:flex;gap:8px;align-items:center;text-transform:none"><input type="checkbox" '+(b.bgimg?'checked':'')+' onchange="setPath(\'shopbanner.banners.'+i+'.bgimg\',this.checked)"> Use image as background</label>'
    + field("Photo Alt Text","shopbanner.banners."+i+".alt")
    + field("Heading","shopbanner.banners."+i+".heading")
    + field("Subheading","shopbanner.banners."+i+".subheading")
    + field("Button Label","shopbanner.banners."+i+".button")
    + '</div>';
}
let imgTarget=null;
function pickImg(path){ imgTarget=path; document.getElementById('imgFile').click(); }
document.getElementById('imgFile').addEventListener('change', ev=>{
  const f=ev.target.files[0]; if(!f||!imgTarget) return;
  const r=new FileReader();
  r.onload=()=>{ setPath(imgTarget, r.result); renderPanel(); };
  r.readAsDataURL(f); ev.target.value='';
});
document.getElementById('jsonFile').addEventListener('change', ev=>{
  const f=ev.target.files[0]; if(!f) return;
  const r=new FileReader();
  r.onload=()=>{ try{ state=Object.assign(clone(SAMPLE), JSON.parse(r.result)); if(state.announce&&state.announce.highlight===undefined)state.announce.highlight=""; if(!state.shopbanner)state.shopbanner=clone(SAMPLE.shopbanner); (state.shopbanner.banners||[]).forEach(b=>{ if(b.heading===undefined){ b.heading=b.title||''; b.subheading=[b.dateline,b.city,b.highlight].filter(Boolean).join(' · '); b.button=b.cta||''; b.alt=b.alt||''; } }); renderPanel(); renderStage(); }
    catch(e){ alert('That file could not be read as Feed Studio JSON.'); } };
  r.readAsText(f); ev.target.value='';
});
function doSave(){
  const blob=new Blob([JSON.stringify(state,null,2)],{type:'application/json'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob); a.download='coffeenutz-post-'+state.mode+'.json'; a.click();
  setTimeout(()=>URL.revokeObjectURL(a.href),1000);
}

/* boot */
renderPanel(); renderStage();
</script>
